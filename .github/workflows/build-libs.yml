name: Build Plugin Libraries

# Two triggers, both explicit:
#
#   1. push of a tag matching `plugins-build-*`. The tag name encodes
#      the scope:
#          plugins-build-N                      all recipes, all platforms
#          plugins-build-<recipe>-N             one recipe, all platforms
#          plugins-build-<platform>-N           all recipes, one platform
#          plugins-build-<platform>-<recipe>-N  one recipe, one platform
#      <N> is an arbitrary integer suffix that lets you tag a fresh
#      build without colliding with a previous one. Recipes that
#      contain dashes (dragonfly-reverb, caps-lv2, …) are handled by
#      matching the platform prefix first; whatever remains is the
#      recipe name.
#
#   2. workflow_dispatch with explicit recipe + platform inputs. Used
#      for ad-hoc runs without tagging.
#
# Commit-libs commits binaries back to the source branch on
# workflow_dispatch only — tags refer to immutable commits and there
# is no branch to push to, so tag builds produce artifacts only.

on:
  push:
    tags:
      - 'plugins-build-*'
  workflow_dispatch:
    inputs:
      recipe:
        description: 'Recipe to build (e.g. nam, dragonfly-reverb, "all"). One upstream group, not a catalogue folder.'
        required: true
        default: 'all'
      platform:
        description: 'Platform to build for'
        type: choice
        required: true
        default: 'all'
        options:
          - all
          - linux-x86_64
          - linux-aarch64
          - macos-universal
          - windows-x64
          - windows-arm64

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      recipes: ${{ steps.detect.outputs.recipes }}
      platform: ${{ steps.detect.outputs.platform }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Resolve recipe + platform from trigger
        id: detect
        run: |
          set -euo pipefail
          KNOWN_PLATFORMS="linux-x86_64 linux-aarch64 macos-universal windows-x64 windows-arm64"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RECIPE="${{ github.event.inputs.recipe }}"
            PLATFORM="${{ github.event.inputs.platform }}"
            echo "Manual trigger: recipe=$RECIPE platform=$PLATFORM"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SCOPE="${TAG#plugins-build-}"
            # strip the trailing numeric suffix, if any
            if echo "$SCOPE" | grep -qE -- '-[0-9]+$'; then
              SCOPE="${SCOPE%-*}"
            fi
            # if all that's left is a bare integer, the tag has no scope
            if echo "$SCOPE" | grep -qE '^[0-9]*$'; then
              SCOPE=""
            fi

            PLATFORM="all"
            RECIPE="all"
            # try to peel a platform prefix off; whatever remains is the recipe
            for p in $KNOWN_PLATFORMS; do
              case "$SCOPE" in
                "$p")   PLATFORM="$p"; SCOPE=""; break ;;
                "$p"-*) PLATFORM="$p"; SCOPE="${SCOPE#$p-}"; break ;;
              esac
            done
            if [ -n "$SCOPE" ]; then
              RECIPE="$SCOPE"
            fi
            echo "Tag trigger: $TAG → recipe=$RECIPE platform=$PLATFORM"
          fi

          # Validate the platform value so a typo in workflow_dispatch
          # or tag name fails the run loudly instead of silently skipping
          # every platform job.
          if [ "$PLATFORM" != "all" ]; then
            case " $KNOWN_PLATFORMS " in
              *" $PLATFORM "*) ;;
              *) echo "ERROR: unknown platform '$PLATFORM'" >&2; exit 1 ;;
            esac
          fi

          echo "recipes=[\"$RECIPE\"]" >> "$GITHUB_OUTPUT"
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

  linux-x86_64:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && (needs.detect-changes.outputs.platform == 'all' || needs.detect-changes.outputs.platform == 'linux-x86_64')
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.detect-changes.outputs.recipes) }}
    steps:
      - run: git config --global url."https://".insteadOf git://
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake meson ninja-build pkg-config \
            autoconf automake libtool \
            lv2-dev libsndfile1-dev libsamplerate0-dev libfftw3-dev \
            libzita-convolver-dev libglu1-mesa-dev libcairo2-dev \
            libx11-dev liblo-dev libjack-jackd2-dev libfluidsynth-dev

      - name: Build ${{ matrix.recipe }}
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/output" \
          DEPS_DIR="$GITHUB_WORKSPACE/deps" \
          BUILD_WORK_DIR="/tmp/openrig-build" \
            bash scripts/build-lib-internal.sh ${{ matrix.recipe }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-${{ matrix.recipe }}
          path: output/

  linux-aarch64:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && (needs.detect-changes.outputs.platform == 'all' || needs.detect-changes.outputs.platform == 'linux-aarch64')
    runs-on: ubuntu-22.04-arm
    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.detect-changes.outputs.recipes) }}
    steps:
      - run: git config --global url."https://".insteadOf git://
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake meson ninja-build pkg-config \
            autoconf automake libtool \
            lv2-dev libsndfile1-dev libsamplerate0-dev libfftw3-dev \
            libzita-convolver-dev libglu1-mesa-dev libcairo2-dev \
            libx11-dev liblo-dev libjack-jackd2-dev libfluidsynth-dev

      - name: Build ${{ matrix.recipe }}
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/output" \
          DEPS_DIR="$GITHUB_WORKSPACE/deps" \
          BUILD_WORK_DIR="/tmp/openrig-build" \
            bash scripts/build-lib-internal.sh ${{ matrix.recipe }}

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-${{ matrix.recipe }}
          path: output/

  macos-universal:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && (needs.detect-changes.outputs.platform == 'all' || needs.detect-changes.outputs.platform == 'macos-universal')
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.detect-changes.outputs.recipes) }}
    steps:
      - run: git config --global url."https://".insteadOf git://
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake meson ninja pkg-config autoconf automake libtool \
            lv2 libsndfile libsamplerate fftw cairo jack fluidsynth

      - name: Build ${{ matrix.recipe }}
        run: |
          OUTPUT_DIR="$GITHUB_WORKSPACE/output" \
          DEPS_DIR="$GITHUB_WORKSPACE/deps" \
          BUILD_WORK_DIR="/tmp/openrig-build" \
          CMAKE_EXTRA="-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0" \
            bash scripts/build-lib-internal.sh ${{ matrix.recipe }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal-${{ matrix.recipe }}
          path: output/

  windows-x64:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && (needs.detect-changes.outputs.platform == 'all' || needs.detect-changes.outputs.platform == 'windows-x64')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.detect-changes.outputs.recipes) }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - shell: bash
        run: git config --global url."https://".insteadOf git://

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-lv2
            mingw-w64-x86_64-libsndfile
            mingw-w64-x86_64-libsamplerate
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-cairo
            make autoconf automake libtool git

      - name: Build ${{ matrix.recipe }}
        env:
          RECIPE: ${{ matrix.recipe }}
        run: |
          export OUTPUT_DIR="$(pwd)/output"
          export DEPS_DIR="$(pwd)/deps"
          export BUILD_WORK_DIR="/tmp/openrig-build"
          # MSYS2/MINGW64 builds natively (no cross prefix); MINGW_TARGET
          # tells lib_ext() to emit .dll.
          export MINGW_TARGET=1
          mkdir -p "$OUTPUT_DIR"
          bash scripts/build-lib-internal.sh "$RECIPE"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ matrix.recipe }}
          path: output/

  windows-arm64:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && (needs.detect-changes.outputs.platform == 'all' || needs.detect-changes.outputs.platform == 'windows-arm64')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        recipe: ${{ fromJson(needs.detect-changes.outputs.recipes) }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - shell: bash
        run: git config --global url."https://".insteadOf git://

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-aarch64-gcc
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-meson
            mingw-w64-clang-x86_64-ninja
            mingw-w64-clang-x86_64-pkg-config
            make autoconf automake libtool git

      - name: Build ${{ matrix.recipe }}
        run: |
          export OUTPUT_DIR="$(pwd)/output"
          export DEPS_DIR="$(pwd)/deps"
          export BUILD_WORK_DIR="/tmp/openrig-build"
          export CROSS_COMPILE="aarch64-w64-mingw32"
          export CC="aarch64-w64-mingw32-gcc"
          export CXX="aarch64-w64-mingw32-g++"
          export CMAKE_EXTRA="-DCMAKE_SYSTEM_NAME=Windows -DCMAKE_SYSTEM_PROCESSOR=ARM64 -DCMAKE_C_COMPILER=aarch64-w64-mingw32-gcc -DCMAKE_CXX_COMPILER=aarch64-w64-mingw32-g++"
          mkdir -p "$OUTPUT_DIR"
          bash scripts/build-lib-internal.sh ${{ matrix.recipe }}

      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-${{ matrix.recipe }}
          path: output/

  # Place each .so/.dylib/.dll under plugins/source/lv2/<plugin>/platform/<plat>/
  # and update the matching plugin's manifest.yaml. A binary is matched to a
  # plugin by basename without extension across ANY platform already declared
  # in the manifest — so a freshly-built Windows .dll lands next to its Linux
  # / macOS siblings even before the manifest declares binaries.windows-x64.
  # The manifest is then updated in place so subsequent runs can dispatch via
  # the direct lookup.
  #
  # A single binary can be claimed by multiple catalogue entries — openAV
  # ArtyFX ships artyfx.so but the LV2 bundle exposes bitta / driva / filta
  # / roomy / satma as separate plugin URIs, each living in its own folder
  # under plugins/source/lv2/. The dispatcher fan-outs the binary to every
  # matching folder rather than stopping at the first hit.
  commit-libs:
    needs: [detect-changes, linux-x86_64, linux-aarch64, macos-universal, windows-x64, windows-arm64]
    # Tags point at immutable commits — there is no branch to push the
    # rebuilt binaries to, so tag-triggered builds publish artifacts only.
    # workflow_dispatch (on a branch) keeps the existing commit-back flow.
    if: always() && needs.detect-changes.outputs.has_changes == 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Dispatch binaries into plugins/source/lv2/<plugin>/platform/<plat>/
        run: |
          set -euo pipefail
          # Artifact directory names are "<platform>-<recipe>". Recipe names
          # can contain dashes (dragonfly-reverb), so the platform is matched
          # against the known set rather than parsed by splitting.
          placed=0
          manifest_writes=0
          for art in artifacts/*/; do
            [ -d "$art" ] || continue
            base=$(basename "$art")
            platform=""
            for plat in linux-x86_64 linux-aarch64 macos-universal windows-x64 windows-arm64; do
              case "$base" in
                ${plat}-*) platform="$plat"; break ;;
              esac
            done
            [ -n "$platform" ] || { echo "skip: $base (unknown platform)"; continue; }

            for bin in "$art"*; do
              [ -f "$bin" ] || continue
              bname=$(basename "$bin")
              stem="${bname%.*}"

              # Collect every manifest whose declared binaries (on ANY
              # platform) share this basename without extension. A brand-new
              # Windows .dll resolves to whichever plugin folders have the
              # same stem on an existing platform — and one binary can be
              # claimed by N folders (LV2 bundles like artyfx.so).
              matched_dirs=()
              for manifest in plugins/source/lv2/*/manifest.yaml; do
                while IFS= read -r expected; do
                  [ -n "$expected" ] && [ "$expected" != "null" ] || continue
                  expected_stem="$(basename "$expected")"
                  expected_stem="${expected_stem%.*}"
                  if [ "$expected_stem" = "$stem" ]; then
                    matched_dirs+=("$(dirname "$manifest")")
                    break
                  fi
                done < <(yq -r '.binaries // {} | .[]' "$manifest")
              done

              if [ ${#matched_dirs[@]} -eq 0 ]; then
                echo "skip: $bname ($platform) — no manifest claims this basename"
                continue
              fi

              for matched in "${matched_dirs[@]}"; do
                mkdir -p "$matched/platform/$platform"
                cp "$bin" "$matched/platform/$platform/$bname"
                echo "place: $matched/platform/$platform/$bname"
                placed=$((placed+1))

                rel="platform/$platform/$bname"
                current=$(yq -r ".binaries.\"$platform\" // \"\"" "$matched/manifest.yaml")
                if [ "$current" != "$rel" ]; then
                  yq -i ".binaries.\"$platform\" = \"$rel\"" "$matched/manifest.yaml"
                  echo "  manifest: set binaries.$platform = $rel"
                  manifest_writes=$((manifest_writes+1))
                fi
              done
            done
          done
          echo "Placed $placed binaries; updated $manifest_writes manifest entries"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins/source/lv2/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          RECIPES=$(echo '${{ needs.detect-changes.outputs.recipes }}' | tr -d '[]"' | tr ',' ' ')
          git commit -m "ci: rebuild prebuilt libs for ${RECIPES}"
          git push
