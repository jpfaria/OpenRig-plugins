# Constant across all captures (dropped): martin / gpc16e / special / rosewood / ir
# (brand + body model + impulse-response markers). The remaining filenames are a
# grab-bag of differently-named exports of the same handful of IRs (vendor
# "standard", an interpolated "itp" family, "jf45" and "fbf" sets) plus 44.1kHz/16-bit
# resampled duplicates (_44100_16_1 -> _44k). They do not factor into real control
# axes, so a single clean 'preset' axis is used; the format suffix is folded into the
# label to keep every entry unique.
