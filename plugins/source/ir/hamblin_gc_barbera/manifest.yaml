manifest_version: 1
id: ir_hamblin_gc_barbera
display_name: GC Barbera
brand: hamblin
type: body
backend: ir
# Names are a grab-bag of IR-maker variants (cuki, jf/jf45, dy initials) plus
# processing markers (2048at48 / 1024 length, 5050 blend) and the constant 'ir'
# token; they do not factor into real control axes -> single 'preset' axis.
parameters:
- name: preset
  display_name: Preset
  values:
  - dy
  - cuki_2048
  - cuki_jf_2048
  - jf45
  - jf45_1024
  - jf45_5050
captures:
