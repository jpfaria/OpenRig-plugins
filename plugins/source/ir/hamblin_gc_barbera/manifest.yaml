    preset: dy
  file: ir/dy.wav
  output_gain_db: -43.8117294
- values:
    preset: cuki_2048
  file: ir/cukiir2048at48.wav
  output_gain_db: -12.9839678
- values:
    preset: cuki_jf_2048
  file: ir/cukijfir2048at48.wav
  output_gain_db: -12.0466108
- values:
    preset: jf45
  file: ir/jf45irdy.wav
  output_gain_db: -12.7273321
- values:
    preset: jf45_1024
  file: ir/jf45ir1024dy.wav
  output_gain_db: -9.2352161
- values:
    preset: jf45_5050
