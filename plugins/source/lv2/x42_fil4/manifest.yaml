manifest_version: 1
id: lv2_x42_fil4
display_name: x42 Parametric EQ
description: x42 fil4 — 4-band parametric equalizer with high/low shelves and zero-latency processing.
brand: x42
license: GPL-2.0
homepage: https://github.com/x42/fil4.lv2
type: filter
backend: lv2
plugin_uri: http://gareus.org/oss/lv2/fil4#stereo
binaries:
  macos-universal: platform/macos-universal/fil4.dylib
  windows-x86_64: platform/windows-x86_64/fil4.dll
  linux-x86_64: platform/linux-x86_64/fil4.so
  linux-aarch64: platform/linux-aarch64/fil4.so
# Parameter tabs for the block editor (issue #119). Keyed by the port's
# lv2:symbol; the live TTL stays the source of truth for which ports exist and
# for their names. A port not listed here is grouped dynamically by the app.
parameters:
  - symbol: enable
    group: General
  - symbol: gain
    group: General
  - symbol: peakreset
    group: General
  - symbol: HighPass
    group: Cut
  - symbol: HPfreq
    group: Cut
  - symbol: HPQ
    group: Cut
  - symbol: LowPass
    group: Cut
  - symbol: LPfreq
    group: Cut
  - symbol: LPQ
    group: Cut
  - symbol: LSsec
    group: Shelf
  - symbol: LSfreq
    group: Shelf
  - symbol: LSq
    group: Shelf
  - symbol: LSgain
    group: Shelf
  - symbol: HSsec
    group: Shelf
  - symbol: HSfreq
    group: Shelf
  - symbol: HSq
    group: Shelf
  - symbol: HSgain
    group: Shelf
  - symbol: sec1
    group: Band 1
  - symbol: freq1
    group: Band 1
  - symbol: q1
    group: Band 1
  - symbol: gain1
    group: Band 1
  - symbol: sec2
    group: Band 2
  - symbol: freq2
    group: Band 2
  - symbol: q2
    group: Band 2
  - symbol: gain2
    group: Band 2
  - symbol: sec3
    group: Band 3
  - symbol: freq3
    group: Band 3
  - symbol: q3
    group: Band 3
  - symbol: gain3
    group: Band 3
  - symbol: sec4
    group: Band 4
  - symbol: freq4
    group: Band 4
  - symbol: q4
    group: Band 4
  - symbol: gain4
    group: Band 4
