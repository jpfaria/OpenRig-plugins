manifest_version: 1
id: lv2_dragonfly_hall
display_name: Dragonfly Hall Reverb
description: Dragonfly Hall Reverb — algorithmic hall reverb with rich spatial depth.
brand: dragonfly
thumbnail: assets/thumbnail.png
screenshot: assets/screenshot.png
license: GPL-3.0
homepage: https://github.com/michaelwillis/dragonfly-reverb
type: reverb
backend: lv2
plugin_uri: https://github.com/michaelwillis/dragonfly-reverb
binaries:
  macos-universal: platform/macos-universal/DragonflyHallReverb_dsp.dylib
  linux-x86_64: platform/linux-x86_64/DragonflyHallReverb_dsp.so
# Parameter tabs for the block editor (issue #119). Keyed by the port's
# lv2:symbol; the live TTL stays the source of truth for which ports exist and
# for their names. A port not listed here is grouped dynamically by the app.
# Tabs mirror the plugin's own UI sections.
parameters:
  - symbol: dry_level
    group: Mix
  - symbol: early_level
    group: Mix
  - symbol: late_level
    group: Mix
  - symbol: early_send
    group: Mix
  - symbol: size
    group: Space
  - symbol: width
    group: Space
  - symbol: delay
    group: Space
  - symbol: diffuse
    group: Space
  - symbol: decay
    group: Space
  - symbol: low_cut
    group: EQ
  - symbol: low_xo
    group: EQ
  - symbol: low_mult
    group: EQ
  - symbol: high_cut
    group: EQ
  - symbol: high_xo
    group: EQ
  - symbol: high_mult
    group: EQ
  - symbol: spin
    group: Modulation
  - symbol: wander
    group: Modulation
  - symbol: modulation
    group: Modulation
