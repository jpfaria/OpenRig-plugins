manifest_version: 1
id: vst3_cocoa_delay
display_name: Cocoa Delay
description: Cocoa Delay — warm analog-style delay with modulation and filtering on repeats.
brand: klevgrand
license: GPL-3.0
homepage: https://github.com/tesselode/cocoa-delay
type: delay
backend: vst3
bundle: bundles/CocoacDelay.vst3
parameters:
- name: feedback
  display_name: Feedback
  vst3_id: 1
  min: 0.0
  max: 100.0
  default: 40.0
  step: 1.0
- name: mix
  display_name: Mix
  vst3_id: 4
  min: 0.0
  max: 100.0
  default: 50.0
  step: 1.0
