display_name: Reverb CloudReverb
description: CloudReverb — shimmer/algorithmic reverb (CloudSeed JUCE port).
brand: xunil-cloud
license: GPL-3.0-or-later
homepage: https://github.com/xunil-cloud/CloudReverb
type: vst3
backend: vst3
