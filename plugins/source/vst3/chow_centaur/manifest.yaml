manifest_version: 1
id: vst3_chow_centaur
display_name: ChowCentaur
description: ChowCentaur — Klon Centaur overdrive emulation (Wave Digital Filter + RNN) by ChowDSP.
brand: chowdsp
license: BSD-3-Clause
homepage: https://github.com/jatinchowdhury18/KlonCentaur
type: gain_pedal
backend: vst3
bundle: bundles/ChowCentaur.vst3
# No manifest-authored knobs: OpenRig hosts VST3 via its NATIVE editor (the
# plugin's own IPlugView in a separate window, crates/vst3/src/editor.rs) and
# discovers parameters at runtime from the plugin's IEditController
# (getParameterCount/getParameterInfo, crates/vst3/src/host.rs). The manifest
# parameters[] block is not consumed by the engine for VST3, so it stays empty.
parameters: []
