manifest_version: 1
id: vst3_chow_centaur
display_name: ChowCentaur
description: ChowCentaur — Klon Centaur overdrive emulation (Wave Digital Filter + RNN) by ChowDSP.
brand: chowdsp
license: BSD-3-Clause
homepage: https://github.com/jatinchowdhury18/KlonCentaur
type: gain_pedal
backend: vst3
bundle: bundles/ChowCentaur.vst3
# vst3_id values are JUCE's non-legacy hash of the parameter's string id
# (uint32 fold, multiplier 31, top bit cleared for Studio One compatibility) —
# computed from the pinned JUCE source, not the index. bypass/mono VST3 params
# are intentionally omitted: OpenRig bypasses at the block level and downmixes
# to mono at the chain level, so exposing them here would fight the host.
parameters:
- name: gain
  display_name: Gain
  vst3_id: 3165055
  min: 0.0
  max: 1.0
  default: 0.5
- name: treble
  display_name: Treble
  vst3_id: 1281885780
  min: 0.0
  max: 1.0
  default: 0.5
- name: level
  display_name: Level
  vst3_id: 102865796
  min: 0.0
  max: 1.0
  default: 0.5
- name: mode
  display_name: Mode
  vst3_id: 1098596799
  min: 0.0
  max: 1.0
  default: 0.0
  step: 1.0
