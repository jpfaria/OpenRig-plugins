manifest_version: 1
id: vst3_retuner
display_name: Pitch reTuner
description: reTuner — Rubber Band pitch shifting and tuning.
brand: kushview
license: GPL-3.0-or-later
homepage: https://github.com/kushview/retuner
type: vst3
backend: vst3
bundle: bundles/reTuner.vst3
# No manifest-authored knobs: OpenRig hosts VST3 via its NATIVE editor and
# discovers parameters at runtime from the plugin's IEditController
# (crates/vst3/src/host.rs). The manifest parameters[] block is not consumed by
# the engine for VST3, so it stays empty.
parameters: []
