manifest_version: 1
id: vst3_frequalizer
display_name: EQ Frequalizer
description: Frequalizer — 6-band parametric EQ with spectrum analyser.
brand: ffaudio
license: BSD-3-Clause
homepage: https://github.com/ffAudio/Frequalizer
type: vst3
backend: vst3
bundle: bundles/Frequalizer.vst3
# No manifest-authored knobs: OpenRig hosts VST3 via its NATIVE editor and
# discovers parameters at runtime from the plugin's IEditController
# (crates/vst3/src/host.rs). The manifest parameters[] block is not consumed by
# the engine for VST3, so it stays empty.
parameters: []
