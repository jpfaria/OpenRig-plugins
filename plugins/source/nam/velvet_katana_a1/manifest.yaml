manifest_version: 1
id: nam_velvet_katana_a1
display_name: Velvet Katana
brand: velvet
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A1
# dropped constant token across all captures: katana (amp/plugin name)
# grab-bag of named voicing/gain characters that do not decompose into
# numeric control settings -> single discrete 'preset' selector
parameters:
- name: preset
  display_name: Preset
  values:
  - country
  - blues_bright
  - larry
  - brad
  - drive
  - drive_plus
captures:
- values:
    preset: country
  file: captures/katana_country.nam
- values:
    preset: blues_bright
  file: captures/katana_blues_bright.nam
- values:
    preset: larry
  file: captures/katana_larry.nam
- values:
    preset: brad
  file: captures/katana_brad.nam
- values:
    preset: drive
  file: captures/katana_drive.nam
- values:
    preset: drive_plus
  file: captures/katana_drive_plus.nam
