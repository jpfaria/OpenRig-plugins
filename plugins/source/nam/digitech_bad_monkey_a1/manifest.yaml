manifest_version: 1
id: nam_digitech_bad_monkey_a1
display_name: DigiTech Bad Monkey
brand: digitech
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A1
# Constant token dropped from every capture: badmonkey (brand/slug).
# Two non-overlapping capture regimes that do not share a knob grid:
#   - boost captures encode real Bad Monkey knobs (Level v10, Low b4/b7,
#     High t6, Gain g0/g4), with Level and High constant across them;
#   - fulltone/glory/klon/noble_odr_1/ts10/zen are named pedal voicings
#     with no knob grid at all.
# Each capture also exists in three NAM model sizes (feather/lite/standard),
# which is training metadata, not a control. Per the grab-bag rule, the
# whole set is exposed as a single 'preset' axis with one unique value per
# capture (knobs/voicing + size folded into the value), so no metadata
# axis ('size', 'nam_size', 'model') is invented.
parameters:
- name: preset
  display_name: Preset
  values:
  - boost_low4_gain0_feather
  - boost_low4_gain0_lite
  - boost_low4_gain0_standard
  - boost_low4_gain4_feather
  - boost_low4_gain4_lite
  - boost_low4_gain4_standard
  - boost_low7_gain0_feather
  - boost_low7_gain0_lite
  - boost_low7_gain0_standard
  - boost_low7_gain4_feather
  - boost_low7_gain4_lite
  - boost_low7_gain4_standard
  - fulltone_feather
  - fulltone_lite
  - fulltone_standard
  - glory_feather
  - glory_lite
  - glory_standard
  - klon_feather
  - klon_lite
  - klon_standard
  - noble_odr1_feather
  - noble_odr1_lite
  - noble_odr1_standard
  - ts10_feather
  - ts10_lite
  - ts10_standard
  - zen_feather
  - zen_lite
  - zen_standard
captures:
- values:
    preset: boost_low4_gain0_feather
  file: captures/badmonkey_boost1_v10_b4_t6_g0_feather.nam
