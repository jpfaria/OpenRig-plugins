- values:
    drive: 12
    tone: 12
    boost: none
  file: captures/od808_noon_noon_a2.nam
- values:
    drive: 2
    tone: 2
    boost: plus6
  file: captures/od808_2pm_2pm_plus6_a2.nam
- values:
    drive: 12
    tone: 12
    boost: plus6
