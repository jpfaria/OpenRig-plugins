# Rocktron Voodu Valve tube preamp — each capture is a distinct factory preset.
# Dropped constant: amp model ("Rocktron Voodu Valve", identical in every capture).
# The "P<NN>" tokens are factory preset/patch slots, not knob positions, so a single
# 'preset' selector is the honest representation.
manifest_version: 1
id: nam_rocktron_a2
display_name: Rocktron
brand: rocktron
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/57217
parameters:
- name: preset
  display_name: Preset
  values:
  - p90
  - p95_greek_lead
  - p10
  - p99
  - p250
  - p11_clean_jazz
captures:
- values:
    preset: p90
  file: captures/rocktron_voodu_valve_p90_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.0
- values:
    preset: p95_greek_lead
  file: captures/rocktron_voodu_valve_p95_greek_lead_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.2
- values:
    preset: p10
  file: captures/rocktron_voodu_valve_p10_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -31.8
- values:
    preset: p99
  file: captures/rocktron_voodu_valve_p99_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -31.7
- values:
    preset: p250
  file: captures/rocktron_voodu_valve_p250_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.1
- values:
    preset: p11_clean_jazz
  file: captures/rocktron_voodu_valve_p11_clean_jazz_a2.nam
