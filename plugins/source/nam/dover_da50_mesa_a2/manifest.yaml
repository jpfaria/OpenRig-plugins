# Dropped constant across all captures: amp = Dover DA-50.
# The only varying factor is the front-end boost: bypassed vs. a
# Horizon Devices Tokyo Drive overdrive in front of the amp.
manifest_version: 1
id: nam_dover_da50_mesa_a2
display_name: DA-50 + Mesa 4u{00d7}12
brand: dover
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/59052
parameters:
- name: boost
  display_name: Boost
  values:
  - "off"
  - tokyo_drive
captures:
- values:
    boost: "off"
  file: captures/dover_da50_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.5
- values:
    boost: tokyo_drive
  file: captures/dover_da50_tokyo_drive_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.1
