# Constant across all captures (dropped): "CaliAxis" custom voicing, captured
# through a custom Metallica Justice IR. The captures differ only by which
# classic Metallica album tone they target, so a single 'preset' axis is used.
manifest_version: 1
id: nam_mesa_triaxis
display_name: Triaxis
brand: mesa
brand_logo: assets/brand_logo.svg
sources:
- https://www.tone3000.com/tones/45358
output_gain_db: 0.0000000
type: preamp
backend: nam
architecture: A2
parameters:
- name: preset
  display_name: Preset
  values:
  - justice
  - puppet
  - black
  - killem
  - ride
captures:
- values:
    preset: justice
  file: captures/cali_axis_justice.nam
  noise_gate:
    enabled: true
    threshold_db: -34.0
- values:
    preset: puppet
  file: captures/caliaxis_puppet.nam
  noise_gate:
    enabled: true
    threshold_db: -34.5
- values:
    preset: black
  file: captures/caliaxis_black.nam
  noise_gate:
    enabled: true
    threshold_db: -34.0
- values:
    preset: killem
  file: captures/caliaxis_killem.nam
  noise_gate:
    enabled: true
    threshold_db: -33.5
- values:
    preset: ride
  file: captures/caliaxis_ride.nam
  noise_gate:
    enabled: true
    threshold_db: -33.5
