# Dropped constants (identical in every capture name): "KSR Ceres One", "48khz".
# Real names from tone3000 id 44519 are "KSR Ceres One - 48khz - <Channel><N>".
# The Ceres One is a preamp pedal with a channel/voicing selector plus a 3-way
# Feel toggle (V2 layout: Up=Thick, Mid=Tight, Down=Fat). The description spells
# out each capture's voicing + Feel position; Gain and EQ sit at noon throughout.
#   Clean1 Pedal Platform / Clean2 Chimey          -> two clean voicings (no Feel)
#   Rhythm1-3 Ares/Orthos Crunch  -> Thick/Tight/Fat
#   Rhythm4-6 Artemis/Gemini Red  -> Thick/Tight/Fat
#   Lead1-3   Colossus Lead       -> Thick/Tight/Fat
manifest_version: 1
id: nam_ksr_ceres_a2
display_name: KSR Ceres
brand: ksr
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/44519
parameters:
- name: voicing
  display_name: Voicing
  values:
  - clean_platform
  - clean_chimey
  - crunch
  - red
  - lead
- name: feel
  display_name: Feel
  values:
  - thick
  - tight
  - fat
captures:
- values:
    voicing: clean_platform
    feel: thick
  file: captures/ksr_ceres_one_clean1_a2.nam
- values:
    voicing: clean_chimey
    feel: thick
  file: captures/ksr_ceres_one_clean2_a2.nam
- values:
    voicing: crunch
    feel: thick
  file: captures/ksr_ceres_one_rhythm1_a2.nam
- values:
    voicing: crunch
    feel: tight
  file: captures/ksr_ceres_one_rhythm2_a2.nam
- values:
    voicing: crunch
    feel: fat
  file: captures/ksr_ceres_one_rhythm3_a2.nam
- values:
    voicing: red
    feel: thick
  file: captures/ksr_ceres_one_rhythm4_a2.nam
- values:
    voicing: red
    feel: tight
  file: captures/ksr_ceres_one_rhythm5_a2.nam
- values:
    voicing: red
    feel: fat
  file: captures/ksr_ceres_one_rhythm6_a2.nam
- values:
    voicing: lead
    feel: thick
  file: captures/ksr_ceres_one_lead1_a2.nam
- values:
    voicing: lead
    feel: tight
  file: captures/ksr_ceres_one_lead2_a2.nam
- values:
    voicing: lead
    feel: fat
  file: captures/ksr_ceres_one_lead3_a2.nam
