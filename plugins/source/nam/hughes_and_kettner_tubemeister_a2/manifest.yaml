# Dropped constant across all captures: "HK40 Full Amp No Cab".
# The "V2" tag on tone3000 only appears on the MV1 re-recordings; it tracks
# mv=1 exactly and is not an independent control, so it is not an axis.
manifest_version: 1
id: nam_hughes_and_kettner_tubemeister_a2
display_name: and TubeMeister
brand: hughes_kettner
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/39045
parameters:
- name: mv
  display_name: Master Volume
  values:
  - 1
  - 2
  - 3
- name: channel
  display_name: Channel
  values:
  - clean
  - crunch
  - lead
- name: variant
  display_name: Variant
  values:
  - std
  - dco
captures:
- values:
    channel: crunch
    mv: 3
    variant: std
  file: captures/mv3_crunch_a2.nam
