# Dropped constant across all captures: "HK40 Full Amp No Cab".
# The "V2" tag on tone3000 only appears on the master=1 re-recordings; it
# tracks master=1 exactly and is not an independent control, so it is not
# an axis. The "dco" boost value selects the DCO Deviltoy overdrive pedal
# in front of the amp; "off" is the bare amp (tone3000 SCO/std variants).
manifest_version: 1
id: nam_hughes_and_kettner_tubemeister_a2
display_name: and TubeMeister
brand: hughes_kettner
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/39045
parameters:
- name: master
  display_name: Master Volume
  values:
  - 1
  - 2
  - 3
- name: channel
  display_name: Channel
  values:
  - clean
  - crunch
  - lead
- name: boost
  display_name: Boost
  values:
  - "off"
  - dco
captures:
- values:
    channel: crunch
    master: 3
    boost: "off"
  file: captures/mv3_crunch_a2.nam
- values:
    channel: crunch
    master: 1
    boost: dco
  file: captures/mv1_crunch_dco_a2.nam
- values:
    channel: crunch
    master: 3
    boost: dco
  file: captures/mv3_crunch_dco_a2.nam
- values:
    channel: clean
    master: 1
    boost: dco
  file: captures/mv1_clean_dco_a2.nam
- values:
    channel: crunch
    master: 2
    boost: dco
  file: captures/mv2_crunch_dco_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.7
- values:
    channel: lead
    master: 3
    boost: dco
  file: captures/mv3_lead_dco_a2.nam
- values:
    channel: clean
    master: 2
    boost: dco
  file: captures/mv2_clean_dco_a2.nam
- values:
    channel: lead
    master: 3
    boost: "off"
  file: captures/mv3_lead_a2.nam
- values:
    channel: crunch
    master: 2
    boost: "off"
  file: captures/mv2_crunch_a2.nam
- values:
    channel: clean
    master: 3
    boost: dco
  file: captures/mv3_clean_dco_a2.nam
- values:
    channel: crunch
    master: 1
    boost: "off"
  file: captures/mv1_crunch_a2.nam
- values:
    channel: clean
    master: 3
    boost: "off"
  file: captures/mv3_clean_a2.nam
- values:
    channel: lead
    master: 2
    boost: "off"
  file: captures/mv2_lead_a2.nam
- values:
    channel: lead
    master: 1
    boost: "off"
  file: captures/mv1_lead_a2.nam
- values:
    channel: clean
    master: 2
    boost: "off"
  file: captures/mv2_clean_a2.nam
- values:
    channel: lead
    master: 2
    boost: dco
  file: captures/mv2_lead_dco_a2.nam
- values:
    channel: clean
    master: 1
    boost: "off"
  file: captures/mv1_clean_a2.nam
- values:
    channel: lead
    master: 1
    boost: dco
  file: captures/mv1_lead_dco_a2.nam
