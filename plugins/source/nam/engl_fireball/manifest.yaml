# Constant across all captures (dropped): the `engl_fireball` amp slug.
# `boost` = pedal in front of the amp (none / ts9 / ts808 / line_driver /
# precision_drive). `voicing` = amp EQ variant of the unboosted capture:
# `mid` (mid control) and `presence_0` / `presence_9h` (presence knob at two
# distinct positions) do not share a numeric scale, so this stays an enum.
manifest_version: 1
id: nam_engl_fireball
display_name: Fireball
brand: engl
brand_logo: assets/brand_logo.svg
sources:
- https://www.tone3000.com/tones/2214
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
parameters:
- name: voicing
  display_name: Voicing
  values:
  - default
  - mid
  - presence_0
  - presence_9h
- name: boost
  display_name: Boost
  values:
  - none
  - ts9
  - ts808
  - line_driver
  - precision_drive
captures:
- values:
    boost: none
    voicing: default
  file: captures/engl_fireball.nam
  noise_gate:
    enabled: true
    threshold_db: -31.7
- values:
    boost: ts9
    voicing: default
  file: captures/engl_fireball_ts9.nam
  noise_gate:
    enabled: true
    threshold_db: -32.3
- values:
    boost: ts808
    voicing: default
  file: captures/engl_fireball_ts808.nam
  noise_gate:
    enabled: true
    threshold_db: -32.1
- values:
    boost: line_driver
    voicing: default
  file: captures/engl_fireball_line_driver.nam
  noise_gate:
    enabled: true
    threshold_db: -31.9
- values:
    boost: precision_drive
    voicing: default
  file: captures/engl_fireball_precision_drive_3.nam
  noise_gate:
    enabled: true
    threshold_db: -32.0
- values:
    boost: none
    voicing: mid
  file: captures/engl_fireball_mid.nam
  noise_gate:
    enabled: true
    threshold_db: -31.8
- values:
    boost: none
    voicing: presence_0
  file: captures/engl_fireball_presence_0.nam
  noise_gate:
    enabled: true
    threshold_db: -31.9
- values:
    boost: none
    voicing: presence_9h
  file: captures/engl_fireball_presence_9h.nam
  noise_gate:
    enabled: true
    threshold_db: -32.0
