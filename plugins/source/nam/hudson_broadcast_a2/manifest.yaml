# Dropped constants (identical across every capture): Low Cut 900.
# Real controls on the Hudson Broadcast: Low Cut (knob), Gain Trim (knob), Level (knob),
# Gain Switch (low/high mode). The "Level" token is coupled to the gain switch
# (low -> Level1200, med/high -> Level130), so it is not an independent axis. The two free
# factors are the Gain Switch (mode) and the numeric Gain Trim knob (gain).
manifest_version: 1
id: nam_hudson_broadcast_a2
display_name: Hudson Broadcast
brand: hudson
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/36540
parameters:
- name: mode
  display_name: Gain Switch
  values:
  - low
  - med
  - high
- name: gain
  display_name: Gain
  values:
  - 3
  - 5
  - 7
  - 9
  - 12
captures:
- values:
    mode: low
    gain: 3
  file: captures/gain_low_300_a2.nam
- values:
    mode: low
    gain: 5
  file: captures/gain_low_500_a2.nam
- values:
    mode: low
    gain: 7
  file: captures/gain_low_700_a2.nam
- values:
    mode: low
    gain: 9
  file: captures/gain_low_900_a2.nam
- values:
    mode: low
    gain: 12
  file: captures/gain_low_1200_a2.nam
- values:
    mode: med
    gain: 3
  file: captures/gain_med_300_a2.nam
- values:
    mode: med
    gain: 5
  file: captures/gain_med_500_a2.nam
- values:
    mode: med
    gain: 7
  file: captures/gain_med_700_a2.nam
- values:
    mode: med
    gain: 9
  file: captures/gain_med_900_a2.nam
- values:
    mode: med
    gain: 12
  file: captures/gain_med_1200_a2.nam
- values:
    mode: high
    gain: 3
  file: captures/gain_high_300_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -36.5
- values:
    mode: high
    gain: 5
  file: captures/gain_high_500_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -36.5
- values:
    mode: high
    gain: 7
  file: captures/gain_high_700_a2.nam
- values:
    mode: high
    gain: 9
  file: captures/gain_high_900_a2.nam
- values:
    mode: high
    gain: 12
  file: captures/gain_high_1200_a2.nam
