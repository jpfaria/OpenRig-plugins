# Dropped constants (identical across every capture): Low Cut 900.
# Note: the "Level" token is coupled to gain_range (low -> Level1200, med/high -> Level130),
# so it is not an independent axis. The two free factors are the gain range selector and the
# numeric Gain knob value.
manifest_version: 1
id: nam_hudson_broadcast_a2
display_name: Hudson Broadcast
brand: hudson
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/36540
parameters:
- name: gain_range
  display_name: Gain Range
  values:
  - low
  - med
  - high
- name: gain
  display_name: Gain
  values:
  - 300
  - 500
  - 700
  - 900
  - 1200
captures:
- values:
    gain_range: low
    gain: 300
  file: captures/gain_low_300_a2.nam
- values:
    gain_range: low
    gain: 500
  file: captures/gain_low_500_a2.nam
- values:
    gain_range: low
    gain: 700
  file: captures/gain_low_700_a2.nam
- values:
    gain_range: low
    gain: 900
  file: captures/gain_low_900_a2.nam
- values:
    gain_range: low
    gain: 1200
  file: captures/gain_low_1200_a2.nam
- values:
    gain_range: med
    gain: 300
  file: captures/gain_med_300_a2.nam
- values:
    gain_range: med
    gain: 500
  file: captures/gain_med_500_a2.nam
- values:
    gain_range: med
    gain: 700
  file: captures/gain_med_700_a2.nam
- values:
    gain_range: med
