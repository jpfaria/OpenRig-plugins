manifest_version: 1
id: nam_synergy_tone_king_imperial_mkii_a2
display_name: Tone King Imperial MKII Module
brand: synergy
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: preamp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/29949
# Dropped constants (identical across every capture): brand prefix "Syn20IR Imp"
# (Synergy 20W IR-loaded Imperial MKII module) and master "M30". The numbered
# "setting" suffix (1-9) is only a gain-sweep index and is NOT a control, so it is
# dropped: each capture's REAL knob positions are decoded straight from the filename
# (g=gain, b=bass, t=tone[treble on C1 / mid-bite on C2], v=volume, r=reverb).
# Channel 1 = Deluxe-Reverb voicing (treble knob); Channel 2 = Tweed voicing whose
# tone knob is the mid-bite. HF = High-Frequency Compensation switch (darker/smoother
# when on). A/B/C = Syn20IR power-amp structure (Fender / Marshall-Vox / Modern).
