manifest_version: 1
id: nam_boss_hm_3_a2
display_name: Boss HM-3
brand: boss
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/2709
# Constant across all captures: brand/pedal name "Boss Hyper Metal" (HM-3) and
# the capture index (01..07). Gain (G), Low (L) and High (H) are the three HM-3
# knobs. "Boost" is a discrete on/off selector (front-end boost). Capture 07
# additionally carries a "T10" tone note in its source name; since no other
# capture states a tone setting it forms no grid, so it is preserved in the
# filename but not exposed as an axis (its g9/l1/h2 combo is already unique).
parameters:
- name: gain
  display_name: Gain
  values:
  - 3
  - 6
  - 7
  - 8
  - 9
- name: low
  display_name: Low
  values:
  - 1
  - 4
  - 6
  - 8
- name: high
  display_name: High
  values:
  - 2
  - 5
  - 7
  - 8
  - 10
- name: boost
  display_name: Boost
  values:
  - none
  - boost
captures:
- values:
    gain: 3
    low: 8
    high: 8
    boost: none
  file: captures/g3_l8_h8_a2.nam
- values:
