# Constant token dropped from every capture name: hm2 (the pedal slug).
# The varying tokens are a grab-bag of named HM-2 voicings (chainsaw, medium,
# warm, bright, full) mixed with gain qualifiers (chainsaw_0gain, high_gain);
# they do not decompose into an independent gain x tone grid, so a single
# clean 'preset' axis is used.
manifest_version: 1
id: nam_boss_hm2_1986_a1
display_name: Heavy Metal HM-2 '86
brand: boss
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A1
parameters:
- name: preset
  display_name: Preset
  values:
  - chainsaw_0gain
  - chainsaw
  - medium
  - warm
  - bright
  - high_gain
  - full
captures:
- values:
    preset: chainsaw_0gain
  file: captures/hm2_chainsaw_0gain.nam
- values:
    preset: chainsaw
  file: captures/hm2_chainsaw.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: medium
  file: captures/hm2_medium.nam
  noise_gate:
    enabled: true
    threshold_db: -31.5
- values:
    preset: warm
  file: captures/hm2_warm.nam
  noise_gate:
    enabled: true
    threshold_db: -32.0
- values:
    preset: bright
  file: captures/hm2_bright.nam
- values:
    preset: high_gain
  file: captures/hm2_high_gain.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: full
  file: captures/hm2_full.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
