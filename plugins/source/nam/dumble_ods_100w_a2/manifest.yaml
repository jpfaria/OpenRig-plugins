manifest_version: 1
id: nam_dumble_ods_100w_a2
display_name: ODS 100W
brand: dumble
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/30435
# Dropped constant token (identical in every capture name): SLAMMIN_DUMBLE_FORD
# gain_stage: clean ("cln") vs overdrive ("od") input voicing (a discrete
# selector, not a knob position) — renamed from a knob-named "gain" axis.
# preset: grab-bag of named amp settings (switch combos -- "Ford"=Rock,
# "Carlton"=Rock+Mids, "AllSwitches"=all three -- plus knob tweaks); the
# "_xstd" suffix marks the xStandard NAM architecture sibling of a Standard
# capture (same dial settings, higher accuracy), kept as a distinct preset.
