# Dropped constants (identical in every capture name):
#   DI (direct input), MBDR (Mesa Boogie Dual Rectifier), MW (Modern),
#   Red (red channel), Mdn (Modern voicing), G-7 (gain 7), Ma-2 (master 2).
# The per-capture presence/treble/middle/bass knob settings come verbatim
# from the tone3000 model names (e.g. "P-2 T-5 M-4 B-2") and are exposed as
# four independent numeric knob axes. Only the six listed combinations were
# captured by the author.
# The load axis is the speaker load the amp was captured through (the author
# says "scroll through loads in the plugin, consider it an extra tone
# control"): 4x12 = Mesa Traditional 4x12 V30 (4FB suffix), srl = Suhr
# Reactive Load (SRL suffix).
manifest_version: 1
id: nam_mesa_rectifier_a2
display_name: Rectifier
brand: mesa
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/69212
parameters:
- name: boost
  display_name: Boost
  values:
  - none
  - tdlx
  - tmb66
  - od808
  - tmb73
  - sd1
- name: presence
  display_name: Presence
  values:
  - 2
  - 3
  - 4
  - 5
  - 6
- name: treble
  display_name: Treble
  values:
  - 0
  - 4
  - 5
  - 6
- name: middle
  display_name: Middle
  values:
  - 3
  - 4
  - 5
  - 6
  - 7
- name: bass
  display_name: Bass
  values:
  - 2
  - 3
  - 4
- name: load
  display_name: Load
  values:
  - 4x12
  - srl
captures:
- values:
    boost: tdlx
    presence: 2
    treble: 5
    middle: 4
    bass: 2
    load: 4x12
