manifest_version: 1
id: nam_mesa_rectifier_a2
display_name: Rectifier
brand: mesa
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/69212
# Only the captured combinations are exposed. 'preset' = the author's six numbered
# Red/Modern settings (the EQ knob positions were dropped from the tone3000 names);
# 'boost' = front pedal (setting 1 only); 'load' = capture load (4x12 / SRL). 'take'
# disambiguates the two distinct preset-1/no-boost/4x12 captures.
parameters:
- name: preset
  display_name: Preset
  values:
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
- name: boost
  display_name: Boost
  values:
  - none
  - sd1
  - tdlx
  - tmb66
  - tmb73
  - od808
- name: load
  display_name: Load
  values:
  - 4x12
  - srl
- name: take
  display_name: Take
  values:
  - a
  - b
captures:
