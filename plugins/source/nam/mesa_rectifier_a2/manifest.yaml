# Dropped constants (identical in every capture name):
#   DI (direct input), MBDR (Mesa Boogie Dual Rectifier), MW (Modern),
#   Red (red channel), Mdn (Modern voicing), G-7 (gain 7), Ma-2 (master 2).
# The eq axis encodes the per-capture presence/treble/mid/bass knob bundle
# (P-T-M-B) verbatim from the tone3000 model names; these four knobs move
# together as fixed bundles, so they are one self-describing selector rather
# than four independent knobs (only the listed combinations were captured).
manifest_version: 1
id: nam_mesa_rectifier_a2
display_name: Rectifier
brand: mesa
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/69212
parameters:
- name: boost
  display_name: Boost
  values:
  - none
  - tdlx
  - tmb66
  - od808
  - tmb73
  - sd1
- name: eq
  display_name: EQ
  values:
  - p2_t5_m4_b2
  - p6_t0_m7_b3
  - p3_t6_m4_b3
  - p3_t6_m6_b3
  - p5_t4_m5_b3
  - p4_t4_m3_b4
- name: loop
  display_name: FX Loop
  values:
  - 4cm
  - series
captures:
- values:
    boost: tdlx
    eq: p2_t5_m4_b2
    loop: 4cm
  file: captures/di_tdlx_mbdr_mw_red_mdn_g7_ma2_p2_t5_m4_b2_4fb_a2.nam
