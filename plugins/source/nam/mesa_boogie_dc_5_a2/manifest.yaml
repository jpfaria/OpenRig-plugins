manifest_version: 1
id: nam_mesa_boogie_dc_5_a2
display_name: DC-5
brand: mesa
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/37731
# Constant token dropped from every capture name: "Mesa DC-5" (amp/brand).
# Names are a grab-bag of named voicings (graphic-EQ curves + boost states)
# with variant indices (SD 805 1-3, Mean 1-5) and per-capture gain settings
# that do not form a consistent control grid, so they collapse to one clean
# 'preset' axis rather than separate voicing/gain knobs.
parameters:
- name: preset
  display_name: Preset
  values:
  - sd_805_1
  - sd_805_2
  - sd_805_3
  - thick_g4
  - thick_g6_5
  - thick_g7_5
  - thick_g8_5
