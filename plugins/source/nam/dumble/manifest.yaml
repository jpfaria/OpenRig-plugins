  file: captures/dumble_crunch_4x12_greenback.nam
- values:
    cabinet: 4x12_g12t
    gain: crunch
  file: captures/dumble_crunch_4x12_g12t.nam
- values:
    cabinet: 4x12_v30
    gain: drive
  file: captures/dumble_drive_4x12_v30.nam
- values:
    cabinet: 4x12_greenback
