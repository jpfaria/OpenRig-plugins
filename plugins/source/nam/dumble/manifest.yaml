manifest_version: 1
id: nam_dumble
display_name: Dumble ODS
description: Neural capture of the legendary Dumble ODS — the holy grail of clean overdrive.
brand: dumble
license: MIT
homepage: https://github.com/sdatkinson/neural-amp-modeler
type: amp
backend: nam
parameters:
