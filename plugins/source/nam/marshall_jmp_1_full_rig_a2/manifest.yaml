manifest_version: 1
id: nam_marshall_jmp_1_full_rig_a2
display_name: JMP-1 Full Rig
brand: marshall
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/45918
# Constant token dropped from every capture name: "JMP" (the amp model).
# The captures are named voicings of the Marshall JMP-1 OD preamp that do
# not decompose into numeric knob settings -> single 'preset' axis.
parameters:
- name: preset
  display_name: Preset
  values:
  - clean
  - crunch_breakup
  - lead_creamy
  - rhythm_1
  - rhythm_2
  - rhythm_3
  - rhythm_deftoned
  - rhythm_od808
captures:
- values:
    preset: clean
  file: captures/clean_a2.nam
- values:
    preset: crunch_breakup
  file: captures/crunch_breakup_a2.nam
- values:
    preset: lead_creamy
  file: captures/lead_creamy_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: rhythm_1
  file: captures/rhythm_1_a2.nam
- values:
    preset: rhythm_2
  file: captures/rhythm_2_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -34.0
- values:
    preset: rhythm_3
  file: captures/rhythm_3_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -31.5
- values:
    preset: rhythm_deftoned
  file: captures/rhythm_deftoned_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.5
- values:
    preset: rhythm_od808
  file: captures/rhythm_od808_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -31.0
