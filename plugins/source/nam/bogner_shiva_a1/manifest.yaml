manifest_version: 1
id: nam_bogner_shiva_a1
display_name: Shiva
description: Neural capture of the Bogner Shiva — dynamic clean-to-crunch amp.
brand: bogner
brand_logo: assets/brand_logo.svg
license: MIT
homepage: https://github.com/sdatkinson/neural-amp-modeler
output_gain_db: 2.2125587
type: amp
backend: nam
architecture: A1
# Axes decoded from descriptive filenames shiva_<voicing>_<cabinet>.nam.
# No constant tokens dropped — both voicing and cabinet vary (full 3x3 product).
# clean/crunch/drive are amp gain-stage voicings (a selector), not a knob sweep.
parameters:
- name: voicing
  display_name: Voicing
  values:
  - clean
  - crunch
  - drive
- name: cabinet
  display_name: Cabinet
  values:
  - 4x12_v30
  - 4x12_greenback
  - 4x12_g12t
captures:
- values:
    cabinet: 4x12_v30
    voicing: clean
  file: captures/shiva_clean_4x12_v30.nam
- values:
    cabinet: 4x12_greenback
    voicing: clean
  file: captures/shiva_clean_4x12_greenback.nam
- values:
    cabinet: 4x12_g12t
    voicing: clean
  file: captures/shiva_clean_4x12_g12t.nam
- values:
    cabinet: 4x12_v30
    voicing: crunch
  file: captures/shiva_crunch_4x12_v30.nam
- values:
    cabinet: 4x12_greenback
    voicing: crunch
  file: captures/shiva_crunch_4x12_greenback.nam
- values:
    cabinet: 4x12_g12t
    voicing: crunch
  file: captures/shiva_crunch_4x12_g12t.nam
- values:
    cabinet: 4x12_v30
    voicing: drive
  file: captures/shiva_drive_4x12_v30.nam
- values:
    cabinet: 4x12_greenback
    voicing: drive
  file: captures/shiva_drive_4x12_greenback.nam
- values:
    cabinet: 4x12_g12t
    voicing: drive
  file: captures/shiva_drive_4x12_g12t.nam
