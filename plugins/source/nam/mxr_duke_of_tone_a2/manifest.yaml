# Dropped constants: Vol = 330 (identical across all captures).
# Drive is collinear with Voicing (med=1200, cranked=500, low=900, color=700,
# high=300), so it is represented by the named Voicing positions, not a free axis.
manifest_version: 1
id: nam_mxr_duke_of_tone_a2
display_name: MXR Duke of Tone
brand: mxr
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/13798
parameters:
- name: mode
  display_name: Mode
  values:
  - od
  - dist
- name: voicing
  display_name: Voicing
  values:
  - high
  - cranked
  - color
  - low
  - med
- name: tone
  display_name: Tone
  values:
  - 230
  - 1030
  - 1200
captures:
- values:
    mode: dist
    tone: 1200
    voicing: med
  file: captures/dot_dist_med_t1200_a2.nam
- values:
    mode: od
    tone: 1200
    voicing: med
  file: captures/dot_od_med_t1200_a2.nam
