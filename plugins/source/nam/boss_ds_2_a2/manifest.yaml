manifest_version: 1
id: nam_boss_ds_2_a2
display_name: Boss DS-2
brand: boss
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/5475
# Dropped constant token 'ds2' (the pedal, present on every capture).
# 'turbo' on two mode-2 captures is redundant — mode 2 IS the DS-2 Turbo
# voicing — so it is folded into mode and not a separate axis.
parameters:
- name: mode
  display_name: Mode
  values:
  - 1
  - 2
- name: character
  display_name: Character
  values:
  - boost
  - default
  - max_dist
captures:
- values:
    character: boost
    mode: 1
  file: captures/ds2_1_boost_a2.nam
- values:
    character: default
    mode: 1
  file: captures/ds2_1_default_a2.nam
- values:
    character: max_dist
    mode: 1
  file: captures/ds2_1_max_dist_a2.nam
- values:
    character: boost
    mode: 2
  file: captures/ds2_2_boost_a2.nam
- values:
    character: default
    mode: 2
  file: captures/ds2_2_turbo_default_a2.nam
- values:
    character: max_dist
    mode: 2
  file: captures/ds2_2_turbo_max_dist_a2.nam
