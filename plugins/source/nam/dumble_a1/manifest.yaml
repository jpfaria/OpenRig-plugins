# Capture names (from embedded NAM metadata) follow: DUMBLE <VOICING> (4X12 <SPEAKER>).
# Two discrete selectors vary: voicing (clean/crunch/drive) and the 4x12 speaker (v30/greenback/g12t).
# Dropped constant: "4x12" — every capture is a 4x12 cab (kept as a label prefix on the cabinet values).
manifest_version: 1
id: nam_dumble_a1
display_name: Dumble ODS
description: Neural capture of the legendary Dumble ODS — the holy grail of clean overdrive.
brand: dumble
license: MIT
homepage: https://github.com/sdatkinson/neural-amp-modeler
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A1
parameters:
- name: voicing
  display_name: Voicing
  values:
  - clean
  - crunch
  - drive
- name: cabinet
  display_name: Cabinet
  values:
  - 4x12_v30
  - 4x12_greenback
  - 4x12_g12t
captures:
- values:
    voicing: clean
    cabinet: 4x12_v30
  file: captures/dumble_clean_4x12_v30.nam
- values:
    voicing: clean
    cabinet: 4x12_greenback
  file: captures/dumble_clean_4x12_greenback.nam
- values:
    voicing: clean
    cabinet: 4x12_g12t
  file: captures/dumble_clean_4x12_g12t.nam
- values:
    voicing: crunch
    cabinet: 4x12_v30
  file: captures/dumble_crunch_4x12_v30.nam
- values:
    voicing: crunch
    cabinet: 4x12_greenback
  file: captures/dumble_crunch_4x12_greenback.nam
- values:
    voicing: crunch
    cabinet: 4x12_g12t
  file: captures/dumble_crunch_4x12_g12t.nam
- values:
    voicing: drive
    cabinet: 4x12_v30
  file: captures/dumble_drive_4x12_v30.nam
- values:
    voicing: drive
    cabinet: 4x12_greenback
  file: captures/dumble_drive_4x12_greenback.nam
- values:
    voicing: drive
    cabinet: 4x12_g12t
  file: captures/dumble_drive_4x12_g12t.nam
