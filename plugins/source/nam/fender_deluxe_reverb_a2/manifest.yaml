# Constant across all captures (dropped): "66 DR" amp-model token (Fender 1966 Deluxe Reverb).
# Real-control axes recovered from tone3000 model names (tone 15222):
#   tube    — stock 6V6 vs the V6-position tube swapped for a 12AX7 ("V6" prefix in the names) for extra gain.
#   channel — Deluxe Reverb voice: norm / bright (bright-switch) / vib (vibrato channel); none = preset names that omit it.
#   voicing — named amp setting (preset-style label). Each label is a fixed
#     volume/treble/bass dial position the author named (e.g. "cranked",
#     "sweet_spot"), or a wiring/signal state with no dial grid
#     (v1_pulled, jumpered, jumpered_sweet, ts9_ds1_boost). V/T/B are
#     locked per label, so they are not independent axes. The "v10 t10 b1"
#     dimed-treble/rolled-off-bass lead tone is named bright_lead.
