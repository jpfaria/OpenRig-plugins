manifest_version: 1
id: nam_ceriatone_ots_mini_20_a2
display_name: OTS Mini 20
brand: ceriatone
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/56493
# Dropped constant: every Lead capture carries "Level03" (a fixed Level knob
# setting for the Lead channel) and no Clean capture does; it is fully
# determined by gain=lead, so it is not an independent axis.
parameters:
- name: gain
  display_name: Gain
  values:
  - clean
  - lead
- name: voicing
  display_name: Voicing
  values:
  - jazz
  - rock
- name: boost
  display_name: Boost
  values:
  - normal
  - pre_boost
- name: switch
  display_name: Switch
  values:
  - neither
  - bright
  - midboost
  - bright_mid
