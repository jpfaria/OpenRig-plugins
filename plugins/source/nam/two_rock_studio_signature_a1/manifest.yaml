  display_name: Voicing
  values:
  - bright
  - bright_mid
- name: gain
  display_name: Gain
  values:
  - 3
  - 5
captures:
- values:
    voicing: bright
    gain: 3
  file: captures/b_g3_t5m5b5_vol7_p5_bf.nam
- values:
    voicing: bright_mid
    gain: 3
  file: captures/bmd_g3_t5m5b5_vol7_p5_bf.nam
- values:
    voicing: bright_mid
    gain: 5
