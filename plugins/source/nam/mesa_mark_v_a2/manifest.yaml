manifest_version: 1
id: nam_mesa_mark_v_a2
display_name: Mark V
brand: mesa
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/57410
# Captures decoded from tone3000 model names (tone 57410). Four discrete
# selectors: channel (Ch 1/2/3), voicing (the channel mode), boost (the drive
# pedal in front, "none" when absent), and mode (the gain/tone variant). All are
# selector switches, not swept knobs, so every axis is an enum.
parameters:
- name: channel
  display_name: Channel
  values:
  - ch1
  - ch2
  - ch3
- name: voicing
  display_name: Voicing
  values:
  - clean
  - fat
  - tweed
  - mk_i
  - cru
  - edge
  - mk_iic
  - mk_iv
  - ext
- name: boost
  display_name: Boost
  values:
  - none
  - sd1
  - "808"
  - ts9
- name: mode
  display_name: Mode
  values:
  - cln
  - cln_sc
  - lg
  - mg
  - hg
  - hg_bal
  - hg_mids
  - hg_scoop
  - eob
  - eob_sc
  - black_metal_i
  - black_metal_ii
captures:
- values:
    channel: ch1
    voicing: clean
    boost: none
    mode: cln
  file: captures/mark_v_ch1_clean_cln_a2.nam
- values:
    channel: ch1
    voicing: fat
    boost: none
    mode: cln_sc
  file: captures/mark_v_ch1_fat_cln_sc_a2.nam
- values:
    channel: ch1
    voicing: tweed
    boost: none
    mode: lg
  file: captures/mark_v_ch1_tweed_lg_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -35.5
- values:
    channel: ch1
    voicing: tweed
    boost: none
    mode: eob
  file: captures/mark_v_ch1_tweed_eob_a2.nam
  noise_gate:
    enabled: true
