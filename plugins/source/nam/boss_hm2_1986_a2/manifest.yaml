# All captures are a 1986 MIJ BOSS HM-2 (constant brand/unit → omitted).
# The numeric names encode the four HM-2 knobs: v=level l=low h=high g=dist.
# Three "Chainsaw" captures have no numeric grid: the classic chainsaw tone is
# all knobs maxed; "chainsaw_0_gain" drops dist to 0; "hm2_eq_pedal_chainsaw"
# is the HM-2 EQ-circuit pedal "with knobs on max" (per the tone3000 notes).
# A small 'preset' axis disambiguates the chainsaw variants from the standard
# knob grid so every capture maps to a unique combo.
manifest_version: 1
id: nam_boss_hm2_1986_a2
display_name: Heavy Metal HM-2 '86
brand: boss
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/6778
parameters:
- name: level
  display_name: Level
  values:
  - 6
  - 8
  - 10
- name: low
  display_name: Low
  values:
  - 4
  - 5
  - 6
  - 8
  - 10
- name: high
  display_name: High
  values:
  - 2
  - 4
  - 5
  - 6
  - 9
  - 10
- name: dist
  display_name: Dist
  values:
  - 0
  - 2
  - 4
  - 5
  - 10
- name: preset
  display_name: Preset
  values:
  - standard
  - chainsaw
  - eq_pedal
captures:
- values:
    level: 10
    low: 4
    high: 6
    dist: 10
    preset: standard
  file: captures/v10_l4_h6_g10_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.2
- values:
    level: 10
    low: 10
    high: 4
    dist: 10
    preset: standard
  file: captures/v10_l10_h4_g10_a2.nam
- values:
    level: 10
    low: 10
    high: 9
    dist: 10
    preset: standard
  file: captures/v10_l10_h9_g10_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.5
- values:
    level: 6
    low: 5
    high: 5
    dist: 5
    preset: standard
  file: captures/v6_l5_h5_g5_a2.nam
