manifest_version: 1
id: nam_mesa_mark_iv
display_name: Mark IV
brand: mesa
brand_logo: assets/brand_logo.svg
sources:
- https://www.tone3000.com/tones/6405
- https://www.tone3000.com/tones/6406
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
# Constant across all captures (dropped): capturer "kdm_slammin", amp "mkiv",
# and the "S" (standard) training variant. The remaining tokens are a curated
# grab-bag of artist/voicing presets that do not factor into orthogonal amp
# control knobs, so they collapse into a single 'preset' axis.
parameters:
- name: preset
  display_name: Preset
  values:
  - tight_iic_rhythm_1
  - tight_iic_rhythm_2
  - fat_iic_rhythm_1
  - fat_iic_rhythm_2
  - petrucci_crunch
  - metallica_85_notes
  - metallica_tba
  - log_sacrament
captures:
- values:
    preset: tight_iic_rhythm_1
  file: captures/kdm_slammin_mkiv_28_tight_iic_rhythm_1_s.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: tight_iic_rhythm_2
  file: captures/kdm_slammin_mkiv_29_tight_iic_rhythm_2_s.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: fat_iic_rhythm_1
  file: captures/kdm_slammin_mkiv_31_fat_iic_rhythm_1_s.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: fat_iic_rhythm_2
  file: captures/kdm_slammin_mkiv_32_fat_iic_rhythm_2_s.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: petrucci_crunch
  file: captures/kdm_slammin_mkiv_34_petrucci_mark_iv_crunch_s.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: metallica_85_notes
  file: captures/kdm_slammin_mkiv_37_metallica_85_notes_s.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: metallica_tba
  file: captures/kdm_slammin_mkiv_39_metallica_tba_s.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
