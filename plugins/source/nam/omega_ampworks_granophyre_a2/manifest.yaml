manifest_version: 1
id: nam_omega_ampworks_granophyre_a2
display_name: Omega Ampworks Granophyre
brand: omega
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/39716
# Constant across all captures (dropped): "Omega Granophyre" (the amp name).
# The captures differ only by NAM training epoch count, mapped to a 'preset' axis.
parameters:
- name: preset
  display_name: Preset
  values:
  - test_100ep
  - final_2000ep
captures:
- values:
    preset: test_100ep
  file: captures/omega_test_100ep_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.4
- values:
    preset: final_2000ep
  file: captures/omega_granophyre_2000ep_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.3
