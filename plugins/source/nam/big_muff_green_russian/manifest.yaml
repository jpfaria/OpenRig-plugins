manifest_version: 1
id: nam_big_muff_green_russian
display_name: Big Muff Green Russian Clone
description: Neural capture of a Green Russian Big Muff clone across a 4×3 grid of drive × tone settings (volume held at 3). Sustain-heavy fuzz used by John Mayer (Battle Studies era — Heartbreak Warfare distorted section) and many others.
brand: electro_harmonix
license: MIT
homepage: https://www.tone3000.com/tones/66686
sources:
- https://www.tone3000.com/tones/66686
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
# Dropped constants (identical across every capture): A-A (amp setting), V-03_00 (volume held at 3).
parameters:
- name: drive
  display_name: Drive
  values:
  - 3
  - 5
  - 9
  - 12
- name: tone
  display_name: Tone
  values:
  - 1.30
  - 10.30
  - 12.00
captures:
