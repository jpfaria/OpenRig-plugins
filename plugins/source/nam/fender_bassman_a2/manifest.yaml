manifest_version: 1
id: nam_fender_bassman_a2
display_name: Bassman
brand: fender
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/13776
# Constant across all captures (dropped): "71 Bassman" amp name, normal-channel-only.
# Filenames encode real knobs V=volume, T=treble, B=bass (tone3000 dial settings).
# These are decomposed into numeric knob axes. The descriptive voicing/setup that
# disambiguates captures sharing the same V/T/B (six are V10 T10 B10; several V5 T8 B5)
# is kept as a 'preset' axis alongside the knobs. ts9_ds1 is a pedal-boosted capture
# with no dial settings stated, so it carries only the preset value. For the jumpered
# captures the knob values are the normal (input) channel's V/T/B.
parameters:
- name: volume
  display_name: Volume
  values: [-1, 3, 5, 6, 7, 8.5, 10]
- name: treble
  display_name: Treble
  values: [-1, 4, 5, 6, 7, 8, 8.5, 10]
- name: bass
  display_name: Bass
  values: [-1, 1, 3, 4, 5, 6, 10]
- name: preset
  display_name: Preset
  values:
  - jumpered_t10
  - jumpered_t8
  - jumpered_channels
  - warm_fuzz
  - v1_pulled
  - v1_pulled_12ax7
  - bright_clean
  - 80s_bass
  - ts9_ds1
  - all_on_5_norm
  - all_on_5_bright
  - all_on_10_bright
  - all_on_10_norm
  - mid_forward
  - warm_sweet_spot
  - sweet_spot
  - fd2_low
  - fd2_high
  - fd2_mid
  - cranked_fd2
  - big_clean
  - big_clean_bright
  - 80s_clean
  - clean_t8_b5
  - clean_t7_b4
  - clean_v6
  - driven_norm
  - driven_bright
  - warm_clean
captures:
- values:
    volume: 6
    treble: 10
    bass: 1
    preset: jumpered_t10
  file: captures/jumpered_norm_v6_t10_b1_bright_into_bass_v8_t1_b10_a2.nam
- values:
    volume: 6
    treble: 8
    bass: 1
    preset: jumpered_t8
  file: captures/jumpered_norm_v6_t8_b1_bright_into_bass_v8_t1_b8_a2.nam
- values:
    volume: 6
    treble: 8
    bass: 1
    preset: jumpered_channels
  file: captures/jumpered_channels_norm_v6_t8_b1_bright_into_bass_v8_t1_b8_a2.nam
- values:
    volume: 5
    treble: 4
    bass: 4
    preset: warm_fuzz
  file: captures/warm_fuzz_v5_t4_b4_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.1
- values:
