manifest_version: 1
id: nam_ibanez_ts808_tone3000
display_name: Ibanez TS808 (tone3000)
description: Neural capture of an Ibanez TS808 Tube Screamer across four gain / tone / level settings. The TS808 is John Mayer's recurring boost into his Two-Rock / Dumble rigs.
brand: ibanez
license: MIT
homepage: https://www.tone3000.com/tones/66205
sources:
- https://www.tone3000.com/tones/66205
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
# Dropped constant: level = 10 (identical across all captures)
parameters:
- name: gain
  display_name: Gain
  values:
  - "0"
  - "3"
  - "8"
- name: tone
  display_name: Tone
  values:
  - "5"
  - "8"
  - "10"
captures:
- values: { gain: "0", tone: "10" }
  file: captures/g0_t10.nam
- values: { gain: "3", tone: "8" }
  file: captures/g3_t8.nam
- values: { gain: "8", tone: "5" }
  file: captures/g8_t5.nam
- values: { gain: "0", tone: "5" }
  file: captures/g0_t5.nam
