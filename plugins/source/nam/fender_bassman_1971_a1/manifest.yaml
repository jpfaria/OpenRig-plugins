manifest_version: 1
id: nam_fender_bassman_1971_a1
display_name: Bassman 1971
brand: fender
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A1
# Dropped constant token across all captures: bassman (amp/plugin slug).
# Capture names are a grab-bag of named voicings that do not decompose
# into real numeric control axes, so they form a single 'preset' selector.
parameters:
- name: preset
  display_name: Preset
  values:
  - clean
  - bright_clean
  - warm_clean
  - sweet_spot
  - warm_sweet_spot
  - cranked
  - 80s_clean
  - big_clean
  - warm_fuzz
captures:
- values:
    preset: clean
  file: captures/bassman_clean.nam
- values:
    preset: bright_clean
  file: captures/bassman_bright_clean.nam
- values:
    preset: warm_clean
  file: captures/bassman_warm_clean.nam
- values:
    preset: sweet_spot
  file: captures/bassman_sweet_spot.nam
- values:
    preset: warm_sweet_spot
  file: captures/bassman_warm_sweet_spot.nam
- values:
    preset: cranked
  file: captures/bassman_cranked.nam
- values:
    preset: 80s_clean
  file: captures/bassman_80s_clean.nam
- values:
    preset: big_clean
  file: captures/bassman_big_clean.nam
- values:
    preset: warm_fuzz
  file: captures/bassman_warm_fuzz.nam
