# Dropped constant token across all captures: "Ly Pedals - King of Tone Clone".
# The pedal's channel and drive character are entangled (red->OD, orange->clean
# boost, both->DST), so they collapse into one honest `mode` selector.
manifest_version: 1
id: nam_ly_pedals_king_of_tone
display_name: LY Pedals KoT (Clone)
brand: ly_pedals
sources:
- https://www.tone3000.com/tones/66648
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
parameters:
- name: mode
  display_name: Mode
  values:
  - red_od
  - both_dst
  - orange_boost
captures:
- values:
    mode: red_od
  file: captures/red_channel_od.nam
- values:
    mode: both_dst
  file: captures/both_channels_dst.nam
- values:
    mode: orange_boost
  file: captures/orange_channel_cln_boost.nam
