manifest_version: 1
id: nam_marshall_jcm2000_dsl
display_name: JCM2000 DSL
brand: marshall
brand_logo: assets/brand_logo.svg
sources:
- https://www.tone3000.com/tones/1895
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
# Dropped constant tokens: bmr (author), marshall_jcm2000 (amp slug),
# esr0 + trailing epoch/ESR id (training metadata).
parameters:
- name: channel
  display_name: Channel
  values:
  - clean
  - crunch
  - od1
  - od2
- name: voicing
  display_name: Voicing
  values:
  - default
  - altrock
  - dimed
captures:
- values:
    channel: clean
    voicing: default
  file: captures/bmr_marshall_jcm2000_clean_esr0_0020.nam
- values:
    channel: crunch
    voicing: default
  file: captures/bmr_marshall_jcm2000_crunch_esr0_0021.nam
- values:
    channel: od1
    voicing: altrock
  file: captures/bmr_marshall_jcm2000_od1_altrock_esr0_0055.nam
  noise_gate:
    enabled: true
    threshold_db: -35.5
- values:
    channel: od1
    voicing: dimed
  file: captures/bmr_marshall_jcm2000_od1_dimed_esr0_0357.nam
  noise_gate:
    enabled: true
    threshold_db: -36.0
- values:
    channel: od2
    voicing: altrock
  file: captures/bmr_marshall_jcm2000_od2_altrock_esr0_0050.nam
  noise_gate:
    enabled: true
    threshold_db: -35.5
- values:
    channel: od2
    voicing: dimed
  file: captures/bmr_marshall_jcm2000_od2_dimed_esr0_0813.nam
  noise_gate:
    enabled: true
    threshold_db: -31.0
