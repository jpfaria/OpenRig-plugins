# Constant across all captures (dropped): amp "PRS MT-15".
# Names are a grab-bag of distinct amp voicings/configs (clean, clean
# breakup, crunch, several metal variants — different wattage, TS/preamp
# boost, sweet spot), not a single continuous knob, so a single 'preset'
# axis. Mirrors the prs_mt15_a2 sibling's single 'preset' axis.
manifest_version: 1
id: nam_prs_mt15_a1
display_name: MT15
brand: prs
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A1
parameters:
- name: preset
  display_name: Preset
  values:
  - clean
  - clean_breakup
  - crunch_red
  - metal_7w
  - metal_ts
  - metal_pre
  - metal_sweet_spot
captures:
- values:
    preset: clean
  file: captures/prs_mt15_clean.nam
- values:
    preset: clean_breakup
  file: captures/prs_mt_15_clean_break_up.nam
- values:
    preset: crunch_red
  file: captures/prs_mt_15_crunch_red.nam
- values:
    preset: metal_7w
  file: captures/prs_mt_15_metal_7_watts.nam
- values:
    preset: metal_ts
  file: captures/prs_mt_15_metal_ts.nam
- values:
    preset: metal_pre
  file: captures/prs_mt_15_metal_pre_amp.nam
- values:
    preset: metal_sweet_spot
  file: captures/prs_mt_15_metal_sweet_spot.nam
  noise_gate:
    enabled: true
    threshold_db: -33.5
