manifest_version: 1
id: nam_ehx_metal_muff_a1
display_name: EHX Metal Muff
brand: ehx
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A1
# Constant token dropped from every capture name: metal_muff (the pedal slug).
# The remaining names are a grab-bag of named tone presets that do not decompose
# into consistent knob axes, so they collapse into a single 'preset' selector.
parameters:
- name: preset
  display_name: Preset
  values:
  - as_an_overdrive
  - eq_noon
  - eq_noon_full_gain
  - evil
  - mega_scoop
  - my_settings
  - nattens_madrigal
  - swedish_chainsaw_ish
  - tob_boost_low_distortion
  - trve_kult
captures:
- values:
    preset: as_an_overdrive
  file: captures/metal_muff_as_an_overdrive.nam
- values:
    preset: eq_noon
  file: captures/metal_muff_eq_noon.nam
- values:
    preset: eq_noon_full_gain
  file: captures/metal_muff_eq_noon_full_gain.nam
  noise_gate:
    enabled: true
    threshold_db: -32.4
- values:
    preset: evil
  file: captures/metal_muff_evil.nam
  noise_gate:
    enabled: true
    threshold_db: -32.0
- values:
    preset: mega_scoop
  file: captures/metal_muff_mega_scoop.nam
- values:
    preset: my_settings
  file: captures/metal_muff_my_settings.nam
- values:
    preset: nattens_madrigal
  file: captures/metal_muff_nattens_madrigal.nam
  noise_gate:
    enabled: true
    threshold_db: -32.1
- values:
    preset: swedish_chainsaw_ish
  file: captures/metal_muff_swedish_chainsaw_ish.nam
  noise_gate:
    enabled: true
    threshold_db: -31.9
- values:
    preset: tob_boost_low_distortion
  file: captures/metal_muff_tob_boost_low_distortion.nam
- values:
    preset: trve_kult
  file: captures/metal_muff_trve_kult.nam
  noise_gate:
    enabled: true
    threshold_db: -32.2
