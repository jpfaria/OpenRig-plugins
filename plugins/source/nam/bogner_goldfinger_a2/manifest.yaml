manifest_version: 1
id: nam_bogner_goldfinger_a2
display_name: Goldfinger
brand: bogner
brand_logo: assets/brand_logo.svg
sources:
- https://www.tone3000.com/tones/35435
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
# Dropped constant across all captures: brand/amp slug "bogner_goldfinger".
# The tone3000 description ("a collection of captures ... super gritty, nasty
# amp") gives no dial settings; the models are a grab-bag of channel/gain
# voicings plus EQ-trim and an old-version capture that do not factor into real
# amp knobs. Collapsed to a single 'preset' axis, one value per capture.
parameters:
- name: preset
  display_name: Preset
  values:
  - clean
  - clean_4db_10k
  - midgain
  - crunch
  - crunch_old
  - higain
  - higain_4db_10k
captures:
- values:
    preset: clean
  file: captures/bogner_goldfinger_clean.nam
- values:
    preset: clean_4db_10k
  file: captures/bogner_goldfinger_clean_4db_10k.nam
- values:
    preset: midgain
  file: captures/bogner_goldfinger_discusting_midgain.nam
  noise_gate:
    enabled: true
    threshold_db: -34.0
- values:
    preset: crunch
  file: captures/bogner_goldfinger_crunch.nam
- values:
    preset: crunch_old
  file: captures/bogner_goldfinger_crunch_old_version_but_its_ok.nam
- values:
    preset: higain
  file: captures/bogner_goldfinger_higain.nam
  noise_gate:
    enabled: true
    threshold_db: -33.0
- values:
    preset: higain_4db_10k
  file: captures/bogner_goldfinger_higain_4db_10k.nam
  noise_gate:
    enabled: true
    threshold_db: -31.0
