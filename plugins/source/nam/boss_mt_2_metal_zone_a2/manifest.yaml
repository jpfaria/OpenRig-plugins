manifest_version: 1
id: nam_boss_mt_2_metal_zone_a2
display_name: Boss MT-2 Metal Zone
brand: boss
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/64957
# Constant across all captures (dropped): "DRPS BOSS Metal Zone MT-2".
# The tone3000 names spell out the MT-2 front panel knobs, so they are
# exposed as real numeric axes: L=Level, H=High, M=Mid level,
# MF=Mid Frequency, DIST=Distortion. The "Everything 12 o'clock"
# snapshot is noon on every dial -> all knobs at 5
# (file: l5_h5_m5_mf5_dist5). TWO profiles were uploaded at the
# IDENTICAL panel L6 H4 M6 MF5 DIST2.7 (a/b); the 'take' axis
# disambiguates that single collision while every other capture keeps
# take=a, so all knob combos stay unique.
parameters:
- name: level
  display_name: Level
  values: [5, 6, 8, 9]
- name: high
  display_name: High
  values: [3.8, 4, 5, 7]
- name: mid
  display_name: Mid
  values: [4.8, 5, 6, 7, 10]
- name: mid_freq
  display_name: Mid Freq
  values: [0, 5, 5.5, 7.8]
- name: dist
  display_name: Dist
  values: [2.7, 3, 4, 4.9, 5, 6, 7.8, 8, 10]
- name: take
  display_name: Take
  values: [a, b]
captures:
- values:
    level: 5
    high: 5
    mid: 5
    mid_freq: 5
    dist: 5
    take: a
  file: captures/l5_h5_m5_mf5_dist5_a2.nam
