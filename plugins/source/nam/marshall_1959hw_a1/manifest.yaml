# Constant tokens dropped from every capture name: slammin, plexi, cranked (the "Slammin' Plexi Cranked" model family).
# gain = the cranked dial position (6 / 7) baked into each capture — a real numeric amp control.
# preset = the NAM training variant + epoch count (standard/complex_custom + Xe). These are NAM
#   training-metadata tokens, not amp controls, so they collapse into a single clean selector that
#   keeps every capture unique (the two gain-7 standards differ only by epoch count: 1500e vs 2000e).
manifest_version: 1
id: nam_marshall_1959hw_a1
display_name: 1959HW
brand: marshall
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A1
parameters:
- name: gain
  display_name: Gain
  values:
  - 6
  - 7
- name: preset
  display_name: Preset
  values:
  - complex_1700e
  - standard_1500e
  - complex_2000e
  - standard_2000e
captures:
- values:
    gain: 6
    preset: complex_1700e
  file: captures/slammin_plexi_cranked_6_1700e_complex_custom.nam
- values:
    gain: 7
    preset: standard_1500e
  file: captures/slammin_plexi_cranked_7_1500e_standard.nam
- values:
    gain: 7
    preset: complex_2000e
  file: captures/slammin_plexi_cranked_7_2000e_complex_custom.nam
- values:
    gain: 7
    preset: standard_2000e
  file: captures/slammin_plexi_cranked_7_2000e_standard.nam
