# plus named leads / power-amp-only / bonus captures) that does not factor into a
# clean cross-product of numeric knobs -> single 'preset' axis. Each preset label
# preserves the real control settings from the capture name (ch=channel,
# g=gain, t=treble, m=mid, b=bass, p=presence; ts808 = TS808 boost).
