# Constant token dropped from all capture names: jp2c (model), "Emil Rohbe" (author).
# Filenames encode the JP2C's real front-panel controls (tone3000 dial settings):
# CH=channel (CH1 clean / CH2 rhythm / CH3 lead), G=gain, T=treble, M=mid, B=bass,
# P=presence. These are decomposed into a channel selector + numeric knob axes.
# The descriptive disambiguator that distinguishes captures sharing the same
# CH/G/T/M/B/P (TS808 boost, Shred variant, EQ-less-bass, the named JP lead/rhythm
# and clean setups) is kept as a 'preset' axis alongside the knobs. The captures
# with no stated dial settings (Ultimate Lead, Petrucci Lead, Power-Amp-Only with/
# without EQ, and the five bonus TS808 captures) carry only the 'preset' value.
manifest_version: 1
id: nam_mesa_boogie_jp2c_a2
display_name: JP2C
brand: mesa
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/1686
parameters:
- name: channel
  display_name: Channel
  values:
  - ch1
  - ch2
  - ch3
  - none
- name: gain
  display_name: Gain
  values: [-1, 6, 8, 9, 10]
- name: treble
  display_name: Treble
  values: [-1, 6, 7]
- name: mid
  display_name: Mid
  values: [-1, 1, 2, 3, 4]
- name: bass
  display_name: Bass
  values: [-1, 2, 3, 4]
- name: presence
  display_name: Presence
  values: [-1, 4, 5, 6]
- name: preset
  display_name: Preset
  values:
  - standard
  - ts808
  - shred
  - eq_less_bass
  - jp_lead
  - jp_lead_shred
  - jp_lead_ts808
  - jp_rhythm
  - clean
  - ultimate_lead
  - petrucci_lead
  - power_amp_no_eq
  - power_amp_with_eq
  - bonus4
  - bonus9
  - bonus10
  - bonus11
  - bonus15
