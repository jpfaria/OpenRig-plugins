# Dropped constant token present in every capture name: "71 Bassman".
# tone = the descriptive variant/voicing of each capture (channel mode, pedal/tube-swap mod,
#        all-on setting). It is the real "setting" descriptor, not capture metadata.
# volume / treble / bass = the Bassman normal-channel knobs (V / T / B) for that capture, taken
#        verbatim from the tone3000 model names. The old single `eq` axis packed all three knobs
#        into one slug (e.g. v10_t10_b10) and is decomposed here into three numeric knob axes.
#        For the two-channel jumpered captures the norm-channel V/T/B triplet is used.
#        TS9-DS-1 Boosted has no EQ in its name; it uses the documented clean baseline (V5 T8 B5).
manifest_version: 1
id: nam_fender_bassman_1971_a2
display_name: Bassman 1971
brand: fender
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/6107
