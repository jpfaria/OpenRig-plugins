manifest_version: 1
id: nam_synergy_drect_mesa_a1
display_name: DRECT Mesa
brand: synergy
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A1
# constant across all captures: synergy, drect (the module identity, already in id)
# mic tokens (sm57/sm58) appear only on the boosted captures and do not form a
# clean axis (the unboosted capture has none); they are not modelled as an axis.
parameters:
- name: boost
  display_name: Boost
  values:
  - unboosted
  - od808
  - sd1
captures:
- values:
    boost: unboosted
  file: captures/synergy_drect_unboosted.nam
  noise_gate:
    enabled: true
    threshold_db: -32.6
- values:
    boost: od808
  file: captures/synergy_drect_od808_sm57.nam
  noise_gate:
    enabled: true
    threshold_db: -32.1
- values:
    boost: sd1
  file: captures/synergy_drect_sd1_sm58.nam
  noise_gate:
    enabled: true
    threshold_db: -32.2
