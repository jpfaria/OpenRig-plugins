manifest_version: 1
id: nam_fortin_meshuggah_preamp
display_name: Meshuggah Preamp
brand: fortin
sources:
- https://www.tone3000.com/tones/31452
output_gain_db: -12.9101162
type: preamp
backend: nam
architecture: A2
# Dropped constants across all captures: pre (preamp-only section), unnamed
# (the "UNNAMED" preamp model), std (Standard architecture). Per the tone3000
# description: input = Input switch (lo=Low / hi=High); pull_gain = "Pull Gain"
# pull switch (down=clipping diodes engaged / up=no clipping diodes). The take
# number (#01..#05) is capture metadata, not a control — it only disambiguates
# repeated captures at the same input/pull_gain settings, so it is exposed as
# a neutral 'preset' axis.
parameters:
- name: input
  display_name: Input
  values:
  - lo
  - hi
- name: pull_gain
  display_name: Pull Gain
  values:
  - down
  - up
- name: preset
  display_name: Preset
  values:
  - 1
  - 2
  - 3
  - 4
captures:
- values:
    input: lo
    pull_gain: down
    preset: 2
  file: captures/pre_unnamed_lo_down_02_std.nam
- values:
    input: lo
    pull_gain: down
    preset: 3
  file: captures/pre_unnamed_lo_down_03_std.nam
- values:
    input: lo
    pull_gain: down
    preset: 4
  file: captures/pre_unnamed_lo_down_04_std.nam
- values:
    input: lo
    pull_gain: up
    preset: 1
  file: captures/pre_unnamed_lo_up_01_std.nam
- values:
    input: hi
    pull_gain: down
    preset: 2
  file: captures/pre_unnamed_hi_down_02_std.nam
- values:
    input: hi
    pull_gain: down
    preset: 4
  file: captures/pre_unnamed_hi_down_04_std.nam
- values:
    input: hi
    pull_gain: up
    preset: 1
  file: captures/pre_unnamed_hi_up_01_std.nam
- values:
    input: hi
    pull_gain: up
    preset: 4
  file: captures/pre_unnamed_hi_up_04_std.nam
