manifest_version: 1
id: nam_engl_powerball_ii_a2
display_name: Powerball II
brand: engl
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/54693
# Constant tokens dropped from every capture name: "PB" (Powerball) and the
# capturer tag "Drewhast". boost=on = Original Effects Halcyon Green overdrive
# engaged ("with Boost"). voicing=scoop = scooped-EQ voicing of the Lead 3
# channel ("Slight Scoop").
parameters:
- name: channel
  display_name: Channel
  values:
  - crunch
  - ld3
  - ld4
- name: boost
  display_name: Boost
  values:
  - 'off'
  - 'on'
- name: voicing
  display_name: Voicing
  values:
  - standard
  - scoop
captures:
- values:
    channel: ld3
    boost: 'off'
    voicing: scoop
  file: captures/ld3_slight_scoop_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -31.5
- values:
    channel: ld3
    boost: 'off'
    voicing: standard
  file: captures/ld3_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -35.0
- values:
    channel: crunch
    boost: 'on'
    voicing: standard
  file: captures/crunch_boost_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -31.5
- values:
    channel: ld4
    boost: 'off'
    voicing: standard
  file: captures/ld4_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -35.0
- values:
    channel: ld4
    boost: 'on'
    voicing: standard
  file: captures/ld4_boost_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    channel: crunch
    boost: 'off'
    voicing: standard
  file: captures/crunch_a2.nam
- values:
    channel: ld3
    boost: 'on'
    voicing: standard
  file: captures/ld3_boost_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -30.5
