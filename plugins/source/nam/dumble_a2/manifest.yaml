manifest_version: 1
id: nam_dumble_a2
display_name: Dumble ODS
brand: dumble
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/65812
# Names do not factor into amp control axes; they are distinct capture
# flavors (Hi-Z input, plain, ODS FD). Exposed as a single 'preset' axis.
parameters:
- name: preset
  display_name: Preset
  values:
  - nam_hiz
  - nam
  - odsfd
captures:
- values:
    preset: nam_hiz
  file: captures/nam_hiz_a2.nam
- values:
    preset: nam
  file: captures/nam_a2.nam
- values:
    preset: odsfd
  file: captures/odsfd_a2.nam
