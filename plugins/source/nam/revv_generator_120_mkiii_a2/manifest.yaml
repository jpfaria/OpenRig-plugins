display_name: Revv Generator 120 MKIII
brand: revv
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/42067
# Constant across all captures (dropped): cab/load = Torpedo Captor EQ-matched to a real ENGL 4x12.
# Decoded from the tone3000 model names.
# channel = Revv channel selector (blue/green/purple/red).
# drive = green-channel gain setting; mode = purple/red Aggression switch position.
# bright/cut/fat = the b/c/f voicing switches; voicing = blue/green character tag.
# boost = overdrive pedal in front of the amp.
# preset = disambiguator for otherwise-identical captures: take index (01/02/03),
#          the Solo boost engaged (solo), or an extra OD808 stacked on top (od808).
parameters:
- name: channel
  display_name: Channel
  values:
  - blue
  - green
  - purple
  - red
- name: mode
  display_name: Mode
  values:
  - none
  - 0
  - 1
  - 2
- name: drive
  display_name: Drive
  values:
  - none
  - 0
  - 1
  - 2
- name: bright
  display_name: Bright
  values:
  - 'no'
  - 'yes'
- name: cut
  display_name: Cut
  values:
  - 'no'
  - 'yes'
- name: fat
  display_name: Fat
  values:
  - 'no'
  - 'yes'
- name: voicing
  display_name: Voicing
  values:
  - none
  - clean
  - dist
  - wide
  - stacked
- name: boost
  display_name: Boost
  values:
  - none
  - sd1
  - tkiy
  - '66'
  - bb
  - kot
  - bd2
  - duality_green
  - duality_blue
- name: preset
  display_name: Preset
  values:
  - default
  - '01'
  - '02'
  - '03'
  - solo
  - od808
