manifest_version: 1
id: nam_boss_fz_2_hyper_fuzz_a2
display_name: Boss FZ-2 Hyper Fuzz
brand: boss
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/1740
# Constant across all captures: brand FZ-2. The level/bass/treble knobs are
# baked per mode (fuzz = L8 B7 T5, boost = B8 T6) and covary with mode, so they
# are not independent axes; the two varying controls are mode and gain.
parameters:
- name: mode
  display_name: Mode
  values:
  - fuzz_i
  - fuzz_ii
  - boost
- name: gain
  display_name: Gain
  values:
  - 5
  - 10
captures:
- values:
    mode: fuzz_i
    gain: 5
  file: captures/fuzz_i_l8_b7_t5_g5_a2.nam
- values:
    mode: fuzz_i
    gain: 10
  file: captures/fuzz_i_l8_b7_t5_g10_a2.nam
- values:
    mode: fuzz_ii
    gain: 5
  file: captures/fuzz_ii_l8_b7_t5_g5_a2.nam
- values:
    mode: fuzz_ii
    gain: 10
  file: captures/fuzz_ii_l8_b7_t5_g10_a2.nam
- values:
    mode: boost
    gain: 10
  file: captures/boost_b8_t6_g10_a2.nam
