    gain: pushed
  file: captures/lohi_pushed.nam
- values:
    eq: lomed
    gain: cranked
  file: captures/lomed_cranked.nam
- values:
    eq: lomed
    gain: pushed
  file: captures/lomed_pushed.nam
- values:
    eq: medhi
    gain: cranked
  file: captures/medhi_cranked.nam
- values:
    eq: medhi
    gain: pushed
  file: captures/medhi_pushed.nam
