description: Neural capture of the Mesa/Boogie Mark III — versatile American amp with clean, crunch and lead channels.
brand: mesa
brand_logo: assets/brand_logo.svg
license: MIT
homepage: https://github.com/sdatkinson/neural-amp-modeler
