# DIY clone (Madbean "Aristocrat") of the AnalogMan King of Tone v4.
# Captured by the uploader in 3 channel modes (boost / overdrive / distortion),
# each across tone (3/5/7) and drive (2/4/6/8) knob marks = 36 captures.
# A1 siblings exist on tone3000 but are superseded by these A2 captures.
