# Dropped constants (identical across every capture): Marshall_DSL_20, Drive, Pre&PA.
# boost selector: none = Drive only; boost = Drive+Boost; tight = Drive+Boost_Tight.
manifest_version: 1
id: nam_marshall_dsl_20_hr_a2
display_name: DSL 20 HR
brand: marshall
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/43981
parameters:
- name: boost
  display_name: Boost
  values:
  - none
  - boost
  - tight
- name: gain
  display_name: Gain
  values:
  - 10
  - 12
captures:
- values:
    boost: none
    gain: 12
  file: captures/marshall_dsl_20_drive_gain12_a2.nam
- values:
    boost: none
    gain: 10
  file: captures/marshall_dsl_20_drive_gain10_a2.nam
- values:
    boost: boost
    gain: 10
  file: captures/marshall_dsl_20_drive_boost_gain10_a2.nam
- values:
    boost: boost
    gain: 12
  file: captures/marshall_dsl_20_drive_boost_gain12_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.4
- values:
    boost: tight
    gain: 10
  file: captures/marshall_dsl_20_drive_boost_tight_gain10_a2.nam
- values:
    boost: tight
    gain: 12
  file: captures/marshall_dsl_20_drive_boost_tight_gain12_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.3
