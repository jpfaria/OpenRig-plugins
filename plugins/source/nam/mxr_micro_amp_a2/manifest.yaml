# Constant token dropped across all captures: "MXR MICROAMP" (the pedal identity).
# The MXR Micro Amp's only control is a single Gain knob (range 0-10); captures
# differ by its setting. Qualitative positions decoded to numbers: low=3, mid=5,
# full=10 (full = knob fully CW = top of range).
manifest_version: 1
id: nam_mxr_micro_amp_a2
display_name: MXR Micro Amp
brand: mxr
output_gain_db: 1.1236000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/5122
parameters:
- name: gain
  display_name: Gain
  values:
  - 3
  - 5
  - 10
captures:
- values:
    gain: 5
  file: captures/mxr_microamp_midgain_a2.nam
- values:
    gain: 10
  file: captures/mxr_microamp_fullgain_a2.nam
- values:
    gain: 3
  file: captures/mxr_microamp_lowgain_a2.nam
