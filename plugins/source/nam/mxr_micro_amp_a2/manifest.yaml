# Constant token dropped across all captures: "MXR MICROAMP" (the pedal identity).
# The MXR Micro Amp's only control is a single Gain knob; captures differ by its
# discrete setting (low / mid / full gain), so one selector axis named "gain".
manifest_version: 1
id: nam_mxr_micro_amp_a2
display_name: MXR Micro Amp
brand: mxr
output_gain_db: 1.1236000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/5122
parameters:
- name: gain
  display_name: Gain
  values:
  - low
  - mid
  - full
captures:
- values:
    gain: mid
  file: captures/mxr_microamp_midgain_a2.nam
- values:
    gain: full
  file: captures/mxr_microamp_fullgain_a2.nam
- values:
    gain: low
  file: captures/mxr_microamp_lowgain_a2.nam
