# Dropped constant across all captures: vol=330.
# The voicing word in each filename (high/cranked/color/low/med) is a 1:1
# alias for the drive knob position (300/500/700/900/1200) and is not an
# independent control, so it is folded into the numeric drive axis.
manifest_version: 1
id: nam_mxr_duke_of_tone_a1
display_name: MXR Duke of Tone
brand: mxr
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A1
parameters:
- name: mode
  display_name: Mode
  values:
  - od
  - dist
- name: drive
  display_name: Drive
  values:
  - 300
  - 500
  - 700
  - 900
  - 1200
- name: tone
  display_name: Tone
  values:
  - 230
  - 1030
  - 1200
captures:
- values:
    mode: od
    drive: 300
    tone: 230
  file: captures/dot_od_high_vol_330_tone_230_drive_300.nam
- values:
    mode: od
    drive: 300
    tone: 1030
  file: captures/dot_od_high_vol_330_tone_1030_drive_300.nam
