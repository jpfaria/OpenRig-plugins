# Constant across all captures (dropped): "MXR EVH 5150 Overdrive" (plugin identity).
# Varying control: Boost footswitch (off/on) -> 'boost' selector.
# Labels disengaged/engaged used instead of off/on to avoid YAML bool coercion.
manifest_version: 1
id: nam_mxr_evh_5150_overdrive_a2
display_name: MXR EVH 5150 Overdrive
brand: mxr
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/34605
parameters:
- name: boost
  display_name: Boost
  values:
  - disengaged
  - engaged
captures:
- values:
    boost: disengaged
  file: captures/mxr_evh_5150_overdrive_boost_off_a2.nam
- values:
    boost: engaged
  file: captures/mxr_evh_5150_overdrive_boost_on_a2.nam
