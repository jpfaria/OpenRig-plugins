# Constant across all captures: lead channel (Ironheart Lead channel). The
# fifth capture carries an explicit preamp knob set (bass 1.8 / mid 1 /
# treble 2 / gain 10 / depth 60) distinct from the plain and boosted
# preamps, exposed as boost: custom.
manifest_version: 1
id: nam_laney_ironheart_irt60h_a1
display_name: Ironheart IRT60H
brand: laney
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A1
parameters:
- name: stage
  display_name: Stage
  values:
  - preamp
  - power_amp
- name: boost
  display_name: Boost
  values:
  - none
  - boosted
  - custom
captures:
- values:
    boost: none
    stage: preamp
  file: captures/lead_preamp.nam
  noise_gate:
    enabled: true
    threshold_db: -32.0
- values:
    boost: boosted
    stage: preamp
  file: captures/lead_boosted_preamp.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    boost: custom
    stage: preamp
  file: captures/laney_irt60_lead_pre_b1_8_m_1_t2_g10_d60_tn1.nam
  noise_gate:
    enabled: true
    threshold_db: -31.0
- values:
    boost: none
    stage: power_amp
  file: captures/lead_poweramp.nam
  noise_gate:
    enabled: true
    threshold_db: -32.0
- values:
    boost: boosted
    stage: power_amp
  file: captures/lead_boosted_poweramp.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
