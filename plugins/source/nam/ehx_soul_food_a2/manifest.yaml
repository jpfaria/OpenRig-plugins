manifest_version: 1
id: nam_ehx_soul_food_a2
display_name: EHX Soul Food
brand: ehx
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/6602
# Constant tokens dropped from every capture name: DR (author), EHX, SOUL FOOD (pedal).
# Names are a grab-bag of named voicings with no numeric knob settings -> single 'preset' axis.
parameters:
- name: preset
  display_name: Preset
  values:
  - edge_sweet_spot
  - lead
  - light_breakup
  - max_sustain
  - med_transparent
captures:
- values:
    preset: edge_sweet_spot
  file: captures/edge_sweet_spot_a2.nam
- values:
    preset: lead
  file: captures/lead_a2.nam
- values:
    preset: light_breakup
  file: captures/light_breakup_a2.nam
- values:
    preset: max_sustain
  file: captures/max_sustain_a2.nam
- values:
    preset: med_transparent
  file: captures/med_transparent_a2.nam
