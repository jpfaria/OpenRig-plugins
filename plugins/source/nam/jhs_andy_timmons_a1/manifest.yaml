# Constant tokens dropped from every capture: SLAMMIN (capture author),
# TIMMONS (artist) and JHS/RIVERA (capture source, fully determined by the
# voicing it accompanies). Each tone exists as a real Rivera/JHS voicing
# (bright, dark, main, deliver_us, main_brighter, scoopy) with an optional
# boost, and additionally in three NAM model sizes (c / s / xs = standard /
# small / extra-small). The size tier is training metadata, not a control,
# so it is NOT exposed as an axis. Per the grab-bag rule, the whole set is
# folded into a single 'preset' axis with one unique value per capture
# (voicing + boost + size), so no metadata axis ('quality', 'size',
# 'nam_size', 'model') is invented.
manifest_version: 1
id: nam_jhs_andy_timmons_a1
display_name: Andy Timmons
brand: jhs
thumbnail: assets/thumbnail.png
brand_logo: assets/brand_logo.png
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A1
parameters:
- name: preset
  display_name: Preset
  values:
  - bright_boost_c
  - bright_boost_s
  - bright_boost_xs
  - bright_c
  - bright_s
  - bright_xs
  - dark_boost_c
