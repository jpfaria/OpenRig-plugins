manifest_version: 1
id: nam_mesa_badlander
display_name: Badlander
brand: mesa
brand_logo: assets/brand_logo.svg
sources:
- https://www.tone3000.com/tones/6298
output_gain_db: -13.0248499
type: amp
backend: nam
architecture: A2
# Dropped tokens constant/metadata across captures: leading "s" prefix, the
# "bold" power-mode marker (always bold on the captured amp/pow stages), the
# "ts" Tube Screamer boost marker, and the capturer source label
# (artist/author/factory/reviewer). The amp/pow clean-vs-crush channel and the
# wattage are folded into the distinct preset labels below.
parameters:
- name: stage
  display_name: Stage
  values:
  - pre
  - amp
  - pow
- name: preset
  display_name: Preset
  values:
  - divine_sheep_04
  - divine_sheep_07
  - noon_07
  - astro_horsey_02
  - clean_blues_02
  - scoopy_dew_02
  - murder_tones_01
  - mrscary_bull_04
  - divine_sheep_01
  - pushed_02
captures:
- values:
    stage: pre
    preset: divine_sheep_04
  file: captures/s_pre_divine_sheep_04_artist.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    stage: pre
    preset: divine_sheep_07
  file: captures/s_pre_divine_sheep_07_artist.nam
  noise_gate:
    enabled: true
    threshold_db: -31.0
- values:
    stage: pre
    preset: noon_07
  file: captures/s_pre_noon_07_author.nam
  noise_gate:
    enabled: true
    threshold_db: -31.0
- values:
    stage: pre
    preset: astro_horsey_02
  file: captures/s_pre_astro_horsey_02_ts_artist.nam
  noise_gate:
    enabled: true
    threshold_db: -31.5
- values:
    stage: amp
    preset: clean_blues_02
  file: captures/s_amp_020w_bold_clean_clean_blues_02_factory.nam
- values:
    stage: amp
    preset: scoopy_dew_02
  file: captures/s_amp_100w_bold_clean_scoopy_dew_02_author.nam
  noise_gate:
    enabled: true
    threshold_db: -30.5
- values:
    stage: amp
    preset: murder_tones_01
  file: captures/s_amp_100w_bold_crush_murder_tones_01_reviewer.nam
  noise_gate:
    enabled: true
    threshold_db: -31.5
- values:
    stage: amp
    preset: mrscary_bull_04
  file: captures/s_amp_100w_bold_crush_mrscary_bull_04_reviewer.nam
  noise_gate:
    enabled: true
    threshold_db: -31.0
- values:
    stage: amp
    preset: divine_sheep_01
  file: captures/s_amp_100w_bold_crush_divine_sheep_01_artist.nam
  noise_gate:
    enabled: true
    threshold_db: -31.0
- values:
    stage: pow
    preset: pushed_02
  file: captures/s_pow_100w_bold_clean_pushed_02_factory.nam
  noise_gate:
    enabled: true
    threshold_db: -30.5
