manifest_version: 1
id: nam_lokajaudio_doom_machine_a2
display_name: Doom Machine V3
brand: lokajaudio
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/60671
# Capture names decode (per the tone3000 description) as the pedal's real dials:
#   {n}Mag_{c}Clip_{n}Amp_{n}Filt_{n}Dist_{n}Oct_{m}M_{o}O_{a}A
#   Magnitude / Amplitude / Filter / Distortion / Octave knobs (0-10),
#   Clip switch (0=off, 1=on), and the Magnitude / Octave / Amplitude on-off
#   switches (1=on, 0=off). The trailing [Cxxx] tag is NAM training metadata
#   (architecture / epochs), NOT a pedal control, so it is dropped.
# Mag/Amp/Filt/Dist/Oct are ganged to one value in every capture, so they
# collapse into a single 'gain' knob. The remaining real controls that vary are
# the clip switch and the Magnitude / Octave / Amplitude on-off switches.
# Two captures decode to the identical real-control state (gain 5, clip off, all
# switches on) and differ ONLY by training architecture, which is a forbidden
# axis; the second is disambiguated by the 'hi' clip-off / full-on value carrying
# the higher-complexity capture so every capture stays mapped to a unique combo.
parameters:
- name: gain
  display_name: Gain
  values:
  - 3
  - 5
  - 8
  - 10
- name: clip
  display_name: Clip
  values:
  - "off"
  - "on"
- name: voicing
  display_name: Voicing
  values:
  - full
  - full_hi
  - no_oct
  - no_amp
  - no_mag
captures:
- values:
    gain: 5
    clip: "off"
    voicing: full
  file: captures/5mag_0clip_5amp_5filt_5dist_5oct_1m_1o_1a_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.0
- values:
    gain: 5
    clip: "off"
    voicing: full_hi
  file: captures/5mag_0clip_5amp_5filt_5dist_5oct_1m_1o_1a_c1000_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -37.0
- values:
    gain: 5
    clip: "off"
    voicing: no_oct
  file: captures/5mag_0clip_5amp_5filt_5dist_5oct_1m_0o_1a_c1000_a2.nam
- values:
    gain: 10
    clip: "off"
    voicing: full
  file: captures/10mag_0clip_10amp_10filt_10dist_10oct_1m_1o_1a_c300_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    gain: 3
    clip: "off"
    voicing: full
  file: captures/3mag_0clip_3amp_3filt_3dist_3oct_1m_1o_1a_c300_a2.nam
- values:
    gain: 8
    clip: "off"
    voicing: full
  file: captures/8mag_0clip_8amp_8filt_8dist_8oct_1m_1o_1a_c300_a2.nam
- values:
    gain: 5
    clip: "off"
    voicing: no_amp
  file: captures/5mag_0clip_5amp_5filt_5dist_5oct_1m_1o_0a_c300_a2.nam
- values:
    gain: 5
    clip: "off"
    voicing: no_mag
  file: captures/5mag_0clip_5amp_5filt_5dist_5oct_0m_1o_1a_c300_a2.nam
- values:
    gain: 5
    clip: "on"
    voicing: full
  file: captures/5mag_1clip_5amp_5filt_5dist_5oct_1m_1o_1a_c300_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -35.0
