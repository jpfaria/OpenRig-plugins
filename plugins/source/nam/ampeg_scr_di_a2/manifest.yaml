manifest_version: 1
id: nam_ampeg_scr_di_a2
display_name: SCR-DI
brand: ampeg
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/58940
# Constant token dropped from every capture name: "SCR-DI" (the pedal model)
# and Mid (M50 on every capture, never varies). Real SCR-DI controls per the
# tone3000 description: Volume / Bass / Mid / Treble knobs, Ultra Lo + Ultra Hi
# switches, and a Scrambler distortion switch with its own Drive + Blend knobs.
# Each model name decodes into those settings (e.g. "V65 B65 M50 T65 SCR On
# D100 B100" -> volume 65, bass 65, treble 65, scrambler on, drive 100, blend 100).
parameters:
- name: volume
  display_name: Volume
  values:
  - 50
  - 65
- name: bass
  display_name: Bass
  values:
  - 50
  - 65
- name: treble
  display_name: Treble
  values:
  - 50
  - 65
- name: ultra_lo
  display_name: Ultra Lo
  values:
  - 'off'
  - 'on'
- name: ultra_hi
  display_name: Ultra Hi
  values:
  - 'off'
  - 'on'
- name: scrambler
  display_name: Scrambler
  values:
  - 'off'
  - 'on'
- name: drive
  display_name: Drive
  values:
  - 0
  - 50
  - 100
- name: blend
  display_name: Blend
  values:
  - 0
  - 50
  - 100
captures:
- values:
    volume: 50
    bass: 50
    treble: 50
    ultra_lo: 'off'
    ultra_hi: 'off'
    scrambler: 'off'
    drive: 0
    blend: 0
  file: captures/standard_a2.nam
- values:
    volume: 50
    bass: 50
    treble: 50
    ultra_lo: 'on'
    ultra_hi: 'off'
    scrambler: 'off'
    drive: 0
    blend: 0
  file: captures/ultra_lo_a2.nam
- values:
