manifest_version: 1
id: nam_fulltone_ocd
display_name: OCD Overdrive
brand: fulltone
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A1
parameters:
- name: mode
  display_name: Mode
  values:
  - lp
  - hp
- name: drive
  display_name: Drive
  values:
  - '0'
  - '4'
  - '7'
captures:
- values:
    drive: '0'
    mode: lp
  file: captures/ocd_lp_d0.nam
- values:
    drive: '4'
    mode: lp
  file: captures/ocd_lp_d4.nam
- values:
    drive: '7'
    mode: lp
  file: captures/ocd_lp_d7.nam
- values:
    drive: '0'
    mode: hp
  file: captures/ocd_hp_d0.nam
- values:
    drive: '4'
    mode: hp
  file: captures/ocd_hp_d4.nam
- values:
    drive: '7'
    mode: hp
  file: captures/ocd_hp_d7.nam
