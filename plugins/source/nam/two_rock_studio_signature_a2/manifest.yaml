# Dropped constants (fully determined by the voicing selector, no independent variation):
#   EQ (Treble/Mid/Bass) and Output: BF -> T6M3B6/O8, Trad -> T5M5B5/O7, MS -> T5M5B5/O6.
#   Presence and the lone "BS=4" sub-state are folded into the voicing value
#   (bf_p5 / bf_p9 / bf_p5_bs / trad_p4 / trad_p8 / ms) because they co-move with
#   the voicing and never form an independent grid.
