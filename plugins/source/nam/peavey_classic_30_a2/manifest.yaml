# Dropped constants: none (every capture varies by voicing and/or boost).
manifest_version: 1
id: nam_peavey_classic_30_a2
display_name: Classic 30
brand: peavey
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: preamp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/28906
parameters:
- name: voicing
  display_name: Voicing
  values:
  - clean
  - overdrive
- name: boost
  display_name: Boost
  values:
  - none
  - boss_od3
  - ts9
captures:
- values:
    voicing: overdrive
    boost: none
  file: captures/peavey_classic_30_overdrive_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    voicing: clean
    boost: boss_od3
  file: captures/peavey_classic_30_clean_boss_od3_a2.nam
- values:
    voicing: overdrive
    boost: ts9
  file: captures/peavey_classic_30_overdrive_ibanez_ts9_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    voicing: clean
    boost: none
  file: captures/peavey_classic_30_clean_a2.nam
