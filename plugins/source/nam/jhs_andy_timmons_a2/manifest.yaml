# Dropped constants (identical across all captures): SLAMMIN, TIMMONS, quality=S
manifest_version: 1
id: nam_jhs_andy_timmons_a2
display_name: Andy Timmons
brand: jhs
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/26841
parameters:
- name: voicing
  display_name: Voicing
  values:
  - bright
  - dark
  - main
  - deliver_us
  - main_brighter
  - scoopy
- name: boost
  display_name: Boost
  values:
  - none
  - boost
captures:
- values:
    boost: none
    voicing: dark
  file: captures/slammin_jhs_timmons_dark_a2.nam
- values:
    boost: boost
    voicing: main_brighter
  file: captures/slammin_timmons_rivera_main_brighter_boost_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    boost: none
    voicing: main_brighter
  file: captures/slammin_timmons_rivera_main_brighter_a2.nam
- values:
    boost: none
    voicing: main
  file: captures/slammin_jhs_timmons_main_a2.nam
- values:
    boost: boost
    voicing: main
  file: captures/slammin_jhs_timmons_main_boost_a2.nam
- values:
    boost: none
    voicing: deliver_us
  file: captures/slammin_timmons_rivera_deliver_us_a2.nam
- values:
    boost: boost
    voicing: scoopy
  file: captures/slammin_timmons_rivera_scoopy_boost_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    boost: boost
    voicing: bright
  file: captures/slammin_jhs_timmons_bright_boost_a2.nam
- values:
    boost: none
    voicing: bright
  file: captures/slammin_jhs_timmons_bright_a2.nam
- values:
    boost: boost
    voicing: dark
  file: captures/slammin_jhs_timmons_dark_boost_a2.nam
