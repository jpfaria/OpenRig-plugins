    voicing: midfocus
    drive: 5
  file: captures/sansamp_midfocus_drive5_a2.nam
- values:
    voicing: midfocus
    drive: 8
  file: captures/sansamp_midfocus_drive8_a2.nam
- values:
    voicing: neutral
    drive: 0
  file: captures/sansamp_neutral_drive0_a2.nam
- values:
    voicing: neutral
    drive: 10
