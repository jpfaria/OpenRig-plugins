# Tech 21 SansAmp Character/Driver V2. Voicing (the EQ character: neutral, scooped,
# midfocus with the mid shifted to 1 kHz) x Drive as an ordered sweep (clean=0, low=3,
# mid=5, high=8, maxed=10). The 6 extra blend-variation captures (no voicing label)
# were dropped to keep this a clean voicing x drive grid.
manifest_version: 1
id: nam_tech21_sansamp_v2_a2
display_name: Tech 21 SansAmp Driver V2
brand: tech21
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/34206
parameters:
- name: voicing
  display_name: Voicing
  values:
  - neutral
  - scooped
  - midfocus
- name: drive
  display_name: Drive
  values:
  - 0
  - 3
  - 5
  - 8
  - 10
captures:
- values:
    voicing: midfocus
    drive: 0
  file: captures/sansamp_midfocus_drive0_a2.nam
- values:
    voicing: midfocus
    drive: 10
  file: captures/sansamp_midfocus_drive10_a2.nam
- values:
