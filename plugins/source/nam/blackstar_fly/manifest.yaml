manifest_version: 1
id: nam_blackstar_fly
display_name: Fly
description: Neural capture of the Blackstar Fly — ultra-compact battery-powered amp with ISF tone control.
brand: blackstar
brand_logo: assets/brand_logo.svg
license: MIT
homepage: https://github.com/sdatkinson/neural-amp-modeler
output_gain_db: 0.0000000
type: preamp
backend: nam
parameters:
- name: voicing
  display_name: Voicing
  values:
  - clean
  - crunch
  - od
captures:
- values:
    voicing: clean
  file: captures/clean.nam
- values:
    voicing: crunch
  file: captures/crunch.nam
- values:
    voicing: od
  file: captures/od.nam
