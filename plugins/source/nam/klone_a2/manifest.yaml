manifest_version: 1
id: nam_klone_a2
display_name: Klone
brand: electro-harmonix
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/565
# Klon Centaur DIY ("Klone"). Constant author token "Keith B Klone" dropped.
# Real Klon knobs: Gain, Treble, Output. The numeric g/t/o family decodes
# straight to those knobs (g6_t6_o5 -> gain 6, treble 6, output 5; maxG ->
# gain 10). The "plus BB" family is a separate boost-into-it gain mode
# (low/med/high) that carries no numeric grid -> a grab-bag 'preset' axis.
# Sparse grid: each family fills only its own axes (valid; combos unique).
parameters:
- name: gain
  display_name: Gain
  values:
  - 6
  - 10
- name: treble
  display_name: Treble
  values:
  - 6
- name: output
  display_name: Output
  values:
  - 5
- name: preset
  display_name: Preset
  values:
  - plus_bb_low
  - plus_bb_med
  - plus_bb_high
captures:
- values:
    gain: 6
    treble: 6
    output: 5
  file: captures/g6_t6_o5_a2.nam
- values:
    gain: 10
    treble: 6
    output: 5
  file: captures/maxg_t6_o5_a2.nam
- values:
    preset: plus_bb_low
  file: captures/plus_bb_low_a2.nam
- values:
    preset: plus_bb_med
  file: captures/plus_bb_med_a2.nam
- values:
    preset: plus_bb_high
  file: captures/plus_bb_high_a2.nam
