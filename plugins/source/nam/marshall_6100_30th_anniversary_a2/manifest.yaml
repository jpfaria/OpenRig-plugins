- name: boost
  display_name: Gain Boost
  values:
  - off
  - on
- name: gain
  display_name: Gain
  values:
  - 3.33
  - 5.83
  - 8.33
- name: pedal
  display_name: Front Pedal
  values:
  - aesahaettr
  - boss_sd1
  - ibanez_ts9
  - none
  - precision_drive
captures:
- values:
    boost: on
    gain: 8.33
    pedal: aesahaettr
