# Dropped constants (identical across all captures): channel3-lead (channel 3 / lead).
# boost = the amp's onboard gain-boost switch ("-gb" in tone3000 names = switch engaged).
manifest_version: 1
id: nam_marshall_6100_30th_anniversary_a2
display_name: 6100 - 30th anniversary
brand: marshall
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/61531
# boost = amp onboard Gain Boost switch (gb in filename).
# gain = amp gain knob (low ~10 o'clock = 3.33, mid ~1 o'clock = 5.83, high ~4 o'clock = 8.33).
# pedal = overdrive/boost pedal in front (none/ts9/sd1/precision_drive/aesahaettr).
