manifest_version: 1
id: nam_fulltone_69_a2
display_name: Fulltone 69
brand: fulltone
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/5640
# Grab-bag of named fuzz settings; the "69_" plugin slug and the near-constant
# "bias_and_fuzz" token are dropped. The names mix voicing labels (hendrix,
# stock fuzzface, maxx fuzz) with inconsistent/truncated contour hints, so they
# do not factor into a clean knob grid -> single 'preset' axis. Mirrors the
# fulltone_69_a1 sibling.
parameters:
- name: preset
  display_name: Preset
  values:
  - hendrix_67
  - high_contour
  - low_contour
  - mid_contour
  - mid_contour_2
  - maxx_fuzz
  - stock_fuzzface
captures:
- values:
    preset: hendrix_67
  file: captures/69_hendrix_67_vol_2_contour_12_bias_and_fuzz_full_a2.nam
- values:
    preset: high_contour
  file: captures/69_high_contour_vol_2_contour_bias_and_fuzz_full_a2.nam
- values:
    preset: low_contour
  file: captures/69_high_vol_low_contour_contour_off_vol_bias_and_f_a2.nam
- values:
    preset: mid_contour
  file: captures/69_high_vol_mid_contour_contour_12_vol_bias_and_fu_a2.nam
- values:
    preset: mid_contour_2
  file: captures/69_high_vol_mid_contour_contour_12_vol_bias_and_fu_1_a2.nam
- values:
    preset: maxx_fuzz
  file: captures/69_maxx_fuzz_vol_contour_bias_and_fuzz_full_gain_t_a2.nam
- values:
    preset: stock_fuzzface
  file: captures/69_stock_fuzzface_vol_2_contour_off_bias_and_fuzz_a2.nam
