# Constant across all captures (dropped): arc50c (amp model), std (Standard NAM architecture).
# amp stage = LEAD-channel named lead voicings ([AMP] profiles, IR required); preset axis.
# pow stage = poweramp-only profiles with Presence (P) + Depth (D) knobs and load type
#             (cl = cabinet load / Mesa 4x12, rl = reactive load). Each capture sets every
#             axis (loader requirement): a control the other stage owns carries the not-engaged
#             sentinel — `-1` for a knob (presence/depth), `none` for a selector (load/preset).
manifest_version: 1
id: nam_prs_archon
display_name: Archon
brand: prs
