manifest_version: 1
id: nam_engl_powerball
display_name: Powerball
brand: engl
brand_logo: assets/brand_logo.svg
sources:
- https://www.tone3000.com/tones/29603
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
parameters:
- name: channel
  display_name: Channel
  values:
  - clean
  - crunch
  - overdrive_1
  - overdrive_2
captures:
- values:
    channel: clean
  file: captures/engl_powerball_clean.nam
- values:
    channel: crunch
  file: captures/engl_powerball_crunch.nam
  noise_gate:
    enabled: true
    threshold_db: -32.5
- values:
    channel: overdrive_1
  file: captures/engl_powerball_overdrive_1.nam
  noise_gate:
    enabled: true
    threshold_db: -31.8
- values:
    channel: overdrive_2
  file: captures/engl_powerball_overdrive_2.nam
  noise_gate:
    enabled: true
    threshold_db: -31.7
