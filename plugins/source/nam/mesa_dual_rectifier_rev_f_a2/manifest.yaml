# Constant across all captures (dropped): amp "Dual Rectifier 2ch Rev. F".
# voicing = the amp channel/mode colour (Orange vs Red).
# preset = gain-mode / pedal-boost grab-bag (clean amp gain stages g5-g8,
#          named crunch/rock modes, and TS/F33/Mudkiller/Blink182 boosts) —
#          does not decompose into numeric knobs.
manifest_version: 1
id: nam_mesa_dual_rectifier_rev_f_a2
display_name: Dual Rectifier Rev F
brand: mesa
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/1635
parameters:
- name: voicing
  display_name: Voicing
  values:
  - orange
  - red
- name: preset
  display_name: Preset
  values:
  - crunch
  - heavy_crunch
  - rock
  - f33
  - mudkiller
  - blink182
  - ts9_nevermore
  - g5
  - g6_ts808
  - g7
  - g8
