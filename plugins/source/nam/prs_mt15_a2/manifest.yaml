# Constant across all captures (dropped): amp "PRS MT-15".
# preset axis mirrors the prs_mt15_a1 sibling's single 'preset' axis: the
# four A2 captures are distinct amp configs (two unboosted gain settings,
# two external-boost variants), not a single continuous knob.
manifest_version: 1
id: nam_prs_mt15_a2
display_name: MT15
brand: prs
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/48000
parameters:
- name: preset
  display_name: Preset
  values:
  - unboosted_g3
  - unboosted_g5
  - merciless_drive
  - fortin_14
captures:
- values:
    preset: unboosted_g3
  file: captures/unboosted_g3_a2.nam
- values:
    preset: unboosted_g5
  file: captures/unboosted_g5_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.3
- values:
    preset: merciless_drive
  file: captures/merciless_drive_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.2
- values:
    preset: fortin_14
  file: captures/fortin_14_a2.nam
  noise_gate:
    enabled: true
    threshold_db: -32.2
