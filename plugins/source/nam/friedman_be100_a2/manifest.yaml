manifest_version: 1
id: nam_friedman_be100_a2
display_name: BE 100
brand: friedman
brand_logo: assets/brand_logo.svg
output_gain_db: 0.0000000
type: amp
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/57378
# Constant across all captures (dropped): "Friedman BE-100" amp, "SAT" rig tag.
# Axes decoded from tone3000 names + tone description:
#   voicing — be (BE channel) / hbe (Hairy BE, hotter) / cln (clean)
#   boost   — Maxon OD808 in front (808) or none
#   eq      — tone-stack shape (flat / scoop / mids)
#   gain    — HG high / MG mid / LG low / CLN clean (from description)
parameters:
- name: voicing
  display_name: Voicing
  values:
  - be
  - hbe
  - cln
- name: boost
  display_name: Boost
  values:
  - none
  - '808'
- name: eq
  display_name: EQ
  values:
  - flat
  - scoop
  - mids
- name: gain
  display_name: Gain
  values:
  - hg
  - mg
  - lg
  - cln
captures:
- values:
    voicing: hbe
    boost: '808'
    eq: flat
    gain: hg
  file: captures/hbe_808_flat_hg_a2.nam
- values:
    voicing: hbe
    boost: none
    eq: flat
    gain: hg
  file: captures/hbe_flat_hg_a2.nam
- values:
