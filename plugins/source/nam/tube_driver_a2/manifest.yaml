# Two distinct tube-driver units captured into one plugin (no shared knob axis);
# honest representation is a selector between the two models.
manifest_version: 1
id: nam_tube_driver_a2
display_name: Tube Driver
brand: tube
output_gain_db: 3.6443062
type: gain_pedal
backend: nam
architecture: A2
sources:
- https://www.tone3000.com/tones/44767
parameters:
- name: preset
  display_name: Preset
  values:
  - tube_drive
  - bk_butler
captures:
- values:
    preset: tube_drive
  file: captures/tube_drive_a2.nam
- values:
    preset: bk_butler
  file: captures/bk_butler_tube_driver_a2.nam
