# Dropped constants (identical in every capture): brand/amp name
# "SLAMMIN VOX AC30" and the trailing "S" tag. The descriptor word in each
# filename (warm/bright/push/noon/locut/mids/cranked/fullcrank/streets/noonish)
# is a redundant mnemonic of the bass/treble knob setting, not an independent
# control, so it is not an axis. 'none' on bass/treble/dallastreble means that
# control is absent on that channel (Normal has no tone stack; DallasTreble is a
# Normal-channel-only treble boost present on a few captures).
