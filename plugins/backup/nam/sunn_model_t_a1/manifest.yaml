manifest_version: 1
id: nam_sunn_model_t_a1
display_name: Sunn Model T
brand: sunn
output_gain_db: 0.3520317
type: amp
backend: nam
architecture: A1
# Named drone/doom presets — do not decompose into amp controls. Creator/
# routing tokens dropped from the labels: dde (creator prefix), stmn,
# only_pedal, nocab (capture routing).
parameters:
- name: preset
  display_name: Preset
  values:
  - cathedral
  - thronolith
  - life_droner
  - hyper_droner
captures:
- values:
    preset: cathedral
  file: captures/cathedral_stmn.nam
- values:
    preset: thronolith
  file: captures/dde_thronolith_only_pedal.nam
  noise_gate:
    enabled: true
    threshold_db: -32.5
- values:
    preset: life_droner
  file: captures/dde_life_droner_nocab.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
- values:
    preset: hyper_droner
  file: captures/dde_hyper_droner_nocab.nam
  noise_gate:
    enabled: true
    threshold_db: -30.0
