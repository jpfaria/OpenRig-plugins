# dropped constants: brand=maestro, model=fz_m (FZ-1M)
manifest_version: 1
id: nam_maestro_fuzz_tone_fz_1_a1
display_name: Maestro Fuzz-Tone FZ-1
brand: maestro
output_gain_db: 0.0000000
type: gain_pedal
backend: nam
architecture: A1
parameters:
- name: mode
  display_name: Mode
  values:
  - vintage
  - modern
- name: gain
  display_name: Gain
  values:
  - 3
  - 5
  - 8
captures:
- values:
    mode: vintage
    gain: 3
  file: captures/maestro_fz_m_vintage_low_gain.nam
- values:
    mode: vintage
    gain: 5
  file: captures/maestro_fz_m_vintage_mid_gain.nam
- values:
    mode: vintage
    gain: 8
  file: captures/maestro_fz_m_vintage_high_gain.nam
  noise_gate:
    enabled: true
    threshold_db: -35.5
- values:
    mode: modern
    gain: 5
  file: captures/maestro_fz_m_modern_mid_gain.nam
- values:
    mode: modern
    gain: 8
  file: captures/maestro_fz_m_modern_high_gain.nam
